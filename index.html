<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GateFlow — Operations Manager</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* KEEP ALL YOUR EXISTING CSS HERE */
/* (unchanged from your file) */
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h2>GateFlow</h2>
    <p>Sign in with your work email. We'll send you a one-time link.</p>
    <input type="email" id="loginEmail" placeholder="you@yourcompany.com" />
    <button onclick="signIn()">Send sign-in link</button>
    <div id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <header class="topbar">
    <div class="brand"><span class="brand-mark">G</span> GateFlow</div>
    <div class="user-chip">
      <div>
        <div id="meWho"></div>
        <div id="meRole"></div>
      </div>
      <button onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="layout">
    <nav id="sidebar"></nav>
    <main id="content"></main>
  </div>
</div>
<!-- MODALS -->
<div class="modal" id="shipmentModal"></div>
<div class="modal" id="newShipmentModal"></div>
<div class="modal" id="userModal"></div>

<script>
// 🔴 YOU MUST EDIT THIS
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
 // AUTH
async function signIn() {
  const email = document.getElementById('loginEmail').value;
  const { error } = await sb.auth.signInWithOtp({ email });
  document.getElementById('loginMsg').innerText =
    error ? error.message : 'Check your email';
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

// LOAD USER
async function loadUser() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return null;

  const { data } = await sb
    .from('users')
    .select('*')
    .eq('email', user.email)
    .single();

  return data;
} 
async function boot() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    document.getElementById('loginScreen').style.display = 'flex';
    return;
  }

  const user = await loadUser();

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');

  document.getElementById('meWho').innerText = user.full_name;
  document.getElementById('meRole').innerText = user.role;

  document.getElementById('content').innerHTML = `
    <h1>Welcome ${user.full_name}</h1>
    <p>System is live.</p>
  `;
}

boot();
</script>
</body>
</html>
