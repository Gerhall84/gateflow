<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:#f4f7f8;
      --nav:#04142e;
      --text:#11213d;
      --muted:#6f7d93;
      --brand:#06b7a5;
      --brand-dark:#069788;
      --line:#e4ebed;
      --danger:#ef5c5c;
      --success:#18a66e;
      --warning:#f0a227;
      --blue:#2d79ff;
      --shadow:0 25px 60px rgba(6,20,46,0.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#f4f7f8 0%,#eef4f5 100%);
      color:var(--text);
    }

    button { font-family:inherit; }

    .login-screen {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#04142e,#063b63);
      padding:20px;
    }

    .login-card {
      width:100%;
      max-width:430px;
      background:white;
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }

    .login-card img {
      display:block;
      max-width:200px;
      margin:0 auto 20px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .login-card h1 {
      text-align:center;
      margin:0 0 8px;
      color:var(--nav);
    }

    .login-card p {
      text-align:center;
      margin:0 0 24px;
      color:var(--muted);
    }

    .login-card input,
    .login-card select {
      width:100%;
      height:48px;
      margin-bottom:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      background:white;
    }

    .login-error {
      color:var(--danger);
      font-size:13px;
      margin-top:12px;
      text-align:center;
    }

    .app {
      display:none;
      min-height:100vh;
      grid-template-columns:250px 1fr;
    }

    .sidebar {
      background:linear-gradient(180deg,#04142e,#021127);
      color:white;
      padding:26px 16px;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      box-shadow:4px 0 30px rgba(0,0,0,.25);
    }

    .brand {
      text-align:center;
      padding:10px 8px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand img {
      max-width:180px;
      margin-bottom:12px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .brand strong {
      display:block;
      color:#3f73e8;
      font-size:14px;
    }

    .nav a {
      display:flex;
      color:white;
      padding:14px;
      border-radius:16px;
      font-weight:700;
      margin-bottom:8px;
      text-decoration:none;
      cursor:pointer;
    }

    .nav a.active,
    .nav a:hover {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .side-label {
      color:rgba(255,255,255,.45);
      font-size:11px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      margin:18px 12px 10px;
    }
        .type-nav button {
      width:100%;
      text-align:left;
      background:transparent;
      color:white;
      border:0;
      padding:11px 14px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      margin-bottom:5px;
    }

    .type-nav button:hover,
    .type-nav button.active {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .sidebar-footer {
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
    }

    .avatar {
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:white;
    }

    .main { padding:28px; }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    .primary-btn {
      height:46px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:white;
      padding:0 22px;
      font-weight:900;
      cursor:pointer;
    }

    .secondary-btn {
      height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      padding:0 20px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td {
      padding:12px;
      border-bottom:1px solid var(--line);
    }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      align-items:center;
      justify-content:center;
    }

    .modal.show { display:flex; }

    .modal-box {
      background:white;
      padding:20px;
      border-radius:16px;
      width:400px;
    }
  </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png">
    <h1>GateKeeper</h1>
    <select id="loginUserSelect"></select>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button class="primary-btn" id="loginBtn">Login</button>
    <div id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png">
    </div>
    <div id="sideTypeFilters"></div>
    <div class="sidebar-footer">
      <div id="avatar"></div>
      <div id="userEmail"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="primary-btn" id="openBtn">+ Add Shipment</button>
      <button class="secondary-btn" id="logoutBtn">Logout</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Route</th>
          <th>ETA</th>
          <th>Docs</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Add Shipment</h2>

    <input id="client" placeholder="Customer">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">
    <input id="eta" type="date">

    <div>
      <input id="docUpload" type="file" multiple>
      <div id="docList">No documents</div>
    </div>

    <button id="saveBtn">Save</button>
  </div>
</div>
<script>
const sb = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

const BUCKET = "shipment-documents";

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

const users = [
  { name:"Gerard Hall", email:"gerard.hall@mauriceward.com" },
  { name:"Balazs Bekes", email:"balazs.bekes@mauriceward.com" },
  { name:"Ashley Nason", email:"ashley.nason@mauriceward.com" },
  { name:"Lisa O'Neill", email:"lisa.oneill@mauriceward.com" },
  { name:"Damian Halpin", email:"damian.halpin@mauriceward.com" },
  { name:"Jason O'Neill", email:"jason.o.neill@mauriceward.com" },
  { name:"Ciara Burns", email:"ciara.burns@mauriceward.com" },
  { name:"Dominic Martins", email:"dominic.martins@mauriceward.com" },
  { name:"Roisin Hogan", email:"roisin.hogan@mauriceward.com" },
  { name:"Lee Hodges", email:"lee.hodges@mauriceward.com" },
  { name:"Allanah O'Brien", email:"allanah.obrien@mauriceward.com" },
  { name:"Darragh O Neill", email:"darragh.oneill@mauriceward.com" },
  { name:"Tea Pitanti-Ivanac", email:"tea.pitanti-ivanac@mauriceward.com" },
  { name:"Gary Mc Gettrick", email:"gary.mcgettrick@mauriceward.com" },
  { name:"Eoin Ryan", email:"eoin.ryan@mauriceward.com" },
  { name:"Natacha Martins", email:"natacha.martins@mauriceward.com" }
];

let user = null;
let selectedDocs = [];
let uploadedUrls = [];

function getVal(id) {
  return document.getElementById(id).value.trim();
}

function renderLoginUsers() {
  const select = document.getElementById("loginUserSelect");
  select.innerHTML = `<option value="">Select user</option>` +
    users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

  select.onchange = () => {
    document.getElementById("loginEmail").value = select.value;
  };
}

function extractFirst(text, patterns) {
  for (const p of patterns) {
    const match = text.match(p);
    if (match && match[1]) return match[1].trim().replace(/\s+/g, " ");
  }
  return "";
}

function fillIfEmpty(id, value) {
  if (!value) return;
  const el = document.getElementById(id);
  if (el && !el.value) el.value = value;
}

function normaliseDate(value) {
  if (!value) return "";

  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

  const parts = value.split(/[\/.-]/);
  if (parts.length !== 3) return "";

  let [d, m, y] = parts;
  if (y.length === 2) y = "20" + y;

  return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
}

async function readDocText(file) {
  if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    return text;
  }

  return await file.text();
}

function parseShipmentText(text) {
  const clean = text.replace(/\r/g, "\n");

  const awb = extractFirst(clean, [
    /(?:AWB|Waybill|Waybill No|Waybill Number|Tracking No|Tracking Number)[:\s#-]+([A-Z0-9\-]+)/i
  ]);

  const etaRaw = extractFirst(clean, [
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{4}-[0-9]{2}-[0-9]{2})/i,
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{1,2}[\/.-][0-9]{1,2}[\/.-][0-9]{2,4})/i
  ]);

  const shipper = extractFirst(clean, [
    /(?:Shipper|Sender|Exporter)[:\s]+([^\n]+)/i
  ]);

  const consignee = extractFirst(clean, [
    /(?:Consignee|Receiver|Importer)[:\s]+([^\n]+)/i
  ]);

  const origin = extractFirst(clean, [
    /(?:Origin|From|POL|Port of Loading)[:\s]+([^\n]+)/i
  ]);

  const destination = extractFirst(clean, [
    /(?:Destination|To|POD|Port of Discharge)[:\s]+([^\n]+)/i
  ]);

  fillIfEmpty("client", consignee || shipper);
  fillIfEmpty("origin", origin);
  fillIfEmpty("destination", destination);
  fillIfEmpty("eta", normaliseDate(etaRaw));

  console.log("Parsed document:", { awb, eta: normaliseDate(etaRaw), shipper, consignee });
}

function initDocUpload() {
  const input = document.getElementById("docUpload");
  const list = document.getElementById("docList");

  input.addEventListener("change", async e => {
    selectedDocs = Array.from(e.target.files || []);

    list.innerHTML = selectedDocs.length
      ? selectedDocs.map(f => "📄 " + f.name).join("<br>")
      : "No documents";

    for (const file of selectedDocs) {
      try {
        const text = await readDocText(file);
        parseShipmentText(text);
      } catch (err) {
        console.warn("Could not parse:", file.name, err);
      }
    }
  });
}

async function uploadSelectedDocs() {
  const urls = [];

  for (const file of selectedDocs) {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    const path = `${Date.now()}_${safeName}`;

    const { error } = await sb.storage.from(BUCKET).upload(path, file);

    if (error) {
      alert("Document upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

async function login() {
  const { data, error } = await sb.auth.signInWithPassword({
    email: getVal("loginEmail"),
    password: getVal("loginPassword")
  });

  if (error) {
    document.getElementById("loginError").textContent = error.message;
    return;
  }

  user = data.user;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "grid";
  document.getElementById("userEmail").textContent = user.email;

  await loadShipments();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadShipments() {
  const { data, error } = await sb
    .from("shipments")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Load error: " + error.message);
    return;
  }

  renderRows(data || []);
}

function renderRows(data) {
  document.getElementById("rows").innerHTML = data.map(x => {
    const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

    return `
      <tr>
        <td>${x.shipment_ref || ""}</td>
        <td>${x.client || ""}</td>
        <td>${x.origin || ""} → ${x.destination || ""}</td>
        <td>${x.eta || "-"}</td>
        <td>${docs.length ? docs.map((u, i) => `<a href="${u}" target="_blank">Doc ${i + 1}</a>`).join("<br>") : "-"}</td>
      </tr>
    `;
  }).join("");
}

document.getElementById("loginBtn").onclick = login;
document.getElementById("logoutBtn").onclick = logout;

document.getElementById("openBtn").onclick = () => {
  document.getElementById("modal").classList.add("show");
};

document.getElementById("saveBtn").onclick = async () => {
  const documentUrls = await uploadSelectedDocs();

  const payload = {
    shipment_ref: "SHP" + Date.now(),
    client: getVal("client"),
    origin: getVal("origin"),
    destination: getVal("destination"),
    eta: getVal("eta") || null,
    shipment_type: "Air Import",
    status: "Pending",
    assigned_to: null,
    document_urls: documentUrls,
    created_by_email: user?.email || null,
    source: "manual"
  };

  if (!payload.client || !payload.origin || !payload.destination) {
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  const { error } = await sb.from("shipments").insert([payload]);

  if (error) {
    alert("Save error: " + error.message);
    return;
  }

  selectedDocs = [];
  uploadedUrls = [];
  document.getElementById("docUpload").value = "";
  document.getElementById("docList").innerHTML = "No documents";
  document.getElementById("client").value = "";
  document.getElementById("origin").value = "";
  document.getElementById("destination").value = "";
  document.getElementById("eta").value = "";

  document.getElementById("modal").classList.remove("show");
  await loadShipments();
};

renderLoginUsers();
initDocUpload();
</script>
</body>
</html>
