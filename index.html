<!DOCTYPE html>
<html>
<head>
  <title>GateFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }

    .hidden { display:none; }

    /* LOGIN */
    .login-wrapper {
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box {
      background:white;
      padding:30px;
      border-radius:8px;
      width:300px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button {
      padding:10px;
      width:100%;
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
    }

    /* APP */
    #appScreen {
      display:flex;
      height:100vh;
    }

    .sidebar {
      width:220px;
      background:#111;
      color:white;
      padding:15px;
    }

    .sidebar div {
      margin:10px 0;
      cursor:pointer;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      background:#222;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    .content {
      padding:20px;
      overflow:auto;
    }

    .job {
      background:white;
      padding:10px;
      margin:10px 0;
      border-radius:5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    <h2>GateFlow Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Sign In</button>

    <p id="loginError" style="color:red;"></p>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">

  <div class="sidebar">
    <h3>GateFlow</h3>
    <div onclick="showPage('dashboard')">Dashboard</div>
    <div onclick="showPage('jobs')">Jobs</div>
    <div onclick="showPage('bd')">BD Handovers</div>
    <div onclick="showPage('calendar')">Calendar</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div id="userDisplay"></div>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="content">

      <div id="dashboardPage">
        <h2>Dashboard</h2>
      </div>

      <div id="jobsPage" class="hidden">
        <h2>Create Job</h2>

        <select id="jobType">
          <option>Air Import</option>
          <option>Air Export</option>
          <option>Ocean Import</option>
          <option>Ocean Export</option>
        </select>

        <input id="customer" placeholder="Customer">
        <input id="shipper" placeholder="Shipper">
        <input id="consignee" placeholder="Consignee">
        <input id="ref" placeholder="AWB / Ref">
        <input id="pieces" placeholder="Pieces">
        <input id="weight" placeholder="Weight">
        <input id="collectionDate" type="date">
        <input id="etd" type="date">
        <input id="eta" type="date">
        <input id="transport" placeholder="Airline / Haulier">

        <button onclick="createJob()">Save Job</button>

        <h3>Jobs</h3>
        <div id="jobList"></div>
      </div>

      <div id="bdPage" class="hidden">
        <h2>BD Handovers</h2>
        <input type="file">
      </div>

      <div id="calendarPage" class="hidden">
        <h2>Calendar</h2>
      </div>

    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CURRENT_USER = null;

/* FIXED EVENT WIRING */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("loginBtn").addEventListener("click", login);

  document.getElementById("password").addEventListener("keypress", function(e){
    if(e.key === "Enter") login();
  });
});

/* LOGIN */
async function login(){
  const email = emailInput();
  const password = passwordInput();

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    showError(error.message);
    return;
  }

  const { data:user } = await supabase
    .from('gf_users')
    .select('*')
    .eq('email', email)
    .single();

  if(!user){
    showError("User not in system");
    return;
  }

  CURRENT_USER = user;
  startApp();
}

function emailInput(){ return document.getElementById("email").value.trim(); }
function passwordInput(){ return document.getElementById("password").value; }
function showError(msg){ document.getElementById("loginError").innerText = msg; }

/* START */
function startApp(){
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");

  document.getElementById("userDisplay").innerText =
    "@" + (CURRENT_USER.username || CURRENT_USER.email);

  loadJobs();
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* NAV */
function showPage(page){
  document.querySelectorAll(".content > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(page+"Page").classList.remove("hidden");
}

/* JOBS */
async function createJob(){
  const job = {
    type: jobType.value,
    customer: customer.value,
    shipper: shipper.value,
    consignee: consignee.value,
    ref: ref.value,
    pieces: parseInt(pieces.value),
    weight: parseFloat(weight.value),
    collection_date: collectionDate.value,
    etd: etd.value,
    eta: eta.value,
    transport: transport.value,
    created_by: CURRENT_USER.email
  };

  await supabase.from('gf_jobs').insert([job]);
  loadJobs();
}

async function loadJobs(){
  const { data } = await supabase.from('gf_jobs').select('*');

  const list = document.getElementById("jobList");
  list.innerHTML = "";

  data.forEach(j=>{
    const div = document.createElement("div");
    div.className = "job";
    div.innerHTML = `${j.type} | ${j.customer} | ETA: ${j.eta}`;
    list.appendChild(div);
  });
}
</script>

</body>
</html>
