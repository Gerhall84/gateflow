<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateFlow Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f8}
.sidebar{width:250px;background:#04142e;color:white;height:100vh;float:left;padding:15px}
.nav{padding:12px;cursor:pointer}
.nav:hover{background:#0a1f43}
.content{margin-left:250px;padding:20px}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px}
button{padding:8px;margin-top:5px;border-radius:8px;border:0}
.vip{color:gold;font-weight:bold}
.kanban{display:flex;gap:10px}
.col{background:#eef4f5;padding:10px;border-radius:10px;width:250px}
.job{background:white;margin:5px;padding:8px;border-radius:8px;cursor:grab}
#map{height:300px;border-radius:10px;margin-top:10px}
textarea{width:100%;height:120px}
</style>
</head>

<body>

<div id="login">
<h2>GateFlow</h2>
<select id="userSelect"></select>
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<div class="sidebar">
<div class="nav" onclick="view='dashboard';render()">Dashboard</div>
<div class="nav" onclick="view='kanban';render()">Kanban</div>
<div class="nav" onclick="view='upload';render()">Uploads</div>
</div>

<div class="content" id="content"></div>
</div>

<script>
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user=null, view='dashboard', uploadType='BD', shipments=[], map;

// LOAD USERS
async function loadUsers(){
  const {data}=await sb.from('users').select('*');
  userSelect.innerHTML='<option>Select</option>';
  data.forEach(u=>{
    let o=document.createElement('option');
    o.value=u.email;
    o.textContent=u.full_name;
    userSelect.appendChild(o);
  });
}
loadUsers();

// LOGIN
async function login(){
  const {data,error}=await sb.auth.signInWithPassword({
    email:userSelect.value,
    password:password.value
  });
  if(error){alert(error.message);return;}
  user=data.user;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  initMap();
  loadShipments();
}

// LOAD SHIPMENTS
async function loadShipments(){
  const {data}=await sb.from('shipments').select('*');
  shipments=data;
  render();
}

// DASHBOARD
function dashboard(){
  const mine=shipments.filter(s=>s.assigned_to===user.id);
  const unassigned=shipments.filter(s=>!s.assigned_to);

  content.innerHTML=`
    <h2>Dashboard</h2>
    <div id="map"></div>

    <div class="card">
      <b>My Shipments</b><br>
      ${mine.map(s=>s.shipment_ref).join('<br>')}
    </div>

    <div class="card">
      <b>Unassigned</b><br>
      ${unassigned.map(s=>s.shipment_ref).join('<br>')}
    </div>
  `;

  renderMap(unassigned.concat(mine));
}

// MAP
function initMap(){
  map = L.map('map').setView([53,-6],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

async function renderMap(data){
  if(!map)return;
  data.forEach(s=>{
    if(s.origin && s.destination){
      L.marker([53,-6]).addTo(map);
    }
  });
}

// KANBAN
function kanban(){
  const newJobs=shipments.filter(s=>!s.assigned_to);
  const booked=shipments.filter(s=>s.status==='booked');
  const done=shipments.filter(s=>s.status==='done');

  content.innerHTML=`
  <h2>Kanban</h2>
  <div class="kanban">
    ${col('New',newJobs)}
    ${col('Booked',booked)}
    ${col('Done',done)}
  </div>`;
}

function col(name,list){
  return `<div class="col">
  <h3>${name}</h3>
  ${list.map(s=>`
    <div class="job">
      ${s.vip?'VIP ':''}${s.shipment_ref}
      <br>
      <button onclick="assign('${s.id}')">Assign</button>
    </div>`).join('')}
  </div>`;
}

// ASSIGN
async function assign(id){
  await sb.from('shipments').update({
    assigned_to:user.id,
    status:'booked'
  }).eq('id',id);
  loadShipments();
}

// UPLOAD
function upload(){
  content.innerHTML=`
  <h2>Uploads</h2>

  <select onchange="uploadType=this.value">
    <option>BD</option>
    <option>General Cargo</option>
    <option>Customs</option>
  </select>

  <textarea id="raw"></textarea>
  <button onclick="parse()">Parse</button>
  <button onclick="create()">Create</button>

  <pre id="out"></pre>`;
}

let parsed=null;

function parse(){
  const t=raw.value;

  parsed={
    type:uploadType,
    vip:/vip/i.test(t),
    shipment_ref:(t.match(/SHP\\d+/)||['AUTO-'+Date.now()])[0]
  };

  out.innerText=JSON.stringify(parsed,null,2);
}

// CREATE
async function create(){
  if(!parsed)return alert("Parse first");

  await sb.from('shipments').insert({
    shipment_ref:parsed.shipment_ref,
    shipment_type:parsed.type,
    vip:parsed.vip,
    status:'new'
  });

  loadShipments();
}

// ROUTER
function render(){
  if(view==='dashboard') dashboard();
  if(view==='kanban') kanban();
  if(view==='upload') upload();
}
</script>

</body>
</html>
