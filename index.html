<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:#f4f7f8;
      --nav:#04142e;
      --text:#11213d;
      --muted:#6f7d93;
      --brand:#06b7a5;
      --brand-dark:#069788;
      --line:#e4ebed;
      --danger:#ef5c5c;
      --success:#18a66e;
      --warning:#f0a227;
      --blue:#2d79ff;
      --shadow:0 25px 60px rgba(6,20,46,0.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#f4f7f8 0%,#eef4f5 100%);
      color:var(--text);
    }

    button { font-family:inherit; }

    .login-screen {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#04142e,#063b63);
      padding:20px;
    }

    .login-card {
      width:100%;
      max-width:430px;
      background:white;
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }

    .login-card img {
      display:block;
      max-width:200px;
      margin:0 auto 20px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .login-card h1 {
      text-align:center;
      margin:0 0 8px;
      color:var(--nav);
    }

    .login-card p {
      text-align:center;
      margin:0 0 24px;
      color:var(--muted);
    }

    .login-card input,
    .login-card select {
      width:100%;
      height:48px;
      margin-bottom:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
      background:white;
    }

    .login-error {
      color:var(--danger);
      font-size:13px;
      margin-top:12px;
      text-align:center;
    }

    .app {
      display:none;
      min-height:100vh;
      grid-template-columns:250px 1fr;
    }

    .sidebar {
      background:linear-gradient(180deg,#04142e,#021127);
      color:white;
      padding:26px 16px;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      box-shadow:4px 0 30px rgba(0,0,0,.25);
    }

    .brand {
      text-align:center;
      padding:10px 8px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand img {
      max-width:180px;
      margin-bottom:12px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .brand strong {
      display:block;
      color:#3f73e8;
      font-size:14px;
    }

    .nav a {
      display:flex;
      color:white;
      padding:14px;
      border-radius:16px;
      font-weight:700;
      margin-bottom:8px;
      text-decoration:none;
      cursor:pointer;
    }

    .nav a.active,
    .nav a:hover {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .side-label {
      color:rgba(255,255,255,.45);
      font-size:11px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      margin:18px 12px 10px;
    }

    .type-nav button {
      width:100%;
      text-align:left;
      background:transparent;
      color:white;
      border:0;
      padding:11px 14px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      margin-bottom:5px;
    }

    .type-nav button:hover,
    .type-nav button.active {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .sidebar-footer {
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
    }

    .avatar {
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:white;
    }

    .main { padding:28px; }

    .welcome { margin-bottom:18px; }

    .welcome h1 {
      margin:0 0 8px;
      font-size:28px;
    }

    .welcome p {
      margin:0;
      color:var(--muted);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-left,
    .topbar-right {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .primary-btn {
      height:46px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:white;
      padding:0 22px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 30px rgba(6,183,165,.3);
    }

    .secondary-btn {
      height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--text);
      padding:0 20px;
      font-weight:800;
      cursor:pointer;
    }

    .secondary-btn.active {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }

    .type-filter-bar {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .type-chip {
      height:40px;
      border:1px solid var(--line);
      background:white;
      border-radius:999px;
      padding:0 14px;
      font-weight:900;
      cursor:pointer;
      color:var(--text);
      box-shadow:0 10px 25px rgba(6,20,46,.04);
    }

    .type-chip.active,
    .type-chip:hover {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }
        .action-btn {
      border:0;
      border-radius:12px;
      padding:9px 11px;
      margin-right:6px;
      cursor:pointer;
      background:#f4f7f8;
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin-bottom:16px;
    }

    .card {
      background:white;
      border-radius:22px;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.03);
      overflow:hidden;
    }

    .stat-card {
      padding:22px;
    }

    .stat-label {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }

    .stat-value {
      font-size:30px;
      font-weight:900;
    }

    .grid {
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:16px;
      margin-bottom:16px;
    }

    .section-head {
      padding:20px 20px 12px;
      border-bottom:1px solid var(--line);
    }

    .section-head h2 {
      margin:0;
      color:var(--brand-dark);
      font-size:18px;
    }

    #map {
      height:420px;
      border-radius:18px;
      margin:16px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:12px;
      border-bottom:1px solid var(--line);
    }

    .pill {
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .pending { background:#fff1da; color:#d88d10; }
    .transit { background:#dff7f3; color:#069788; }
    .delayed { background:#ffe4e4; color:#ef5c5c; }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      align-items:center;
      justify-content:center;
    }

    .modal.show { display:flex; }

    .modal-box {
      background:white;
      padding:20px;
      border-radius:16px;
      width:500px;
    }

    .doc-upload-box {
      border:2px dashed var(--line);
      padding:14px;
      margin-bottom:12px;
      text-align:center;
      border-radius:12px;
    }

  </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png">
    <h1>GateKeeper</h1>
    <select id="loginUserSelect"></select>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button class="primary-btn" id="loginBtn">Login</button>
    <div id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png">
    </div>
    <div id="sideTypeFilters"></div>
    <div class="sidebar-footer">
      <div class="avatar" id="avatar"></div>
      <div id="userEmail"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="primary-btn" id="openBtn">+ Add Shipment</button>
      <button class="secondary-btn" id="logoutBtn">Logout</button>
    </div>

    <section class="stats">
      <div class="card stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalStat">0</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">In Transit</div>
        <div class="stat-value" id="transitStat">0</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Delayed</div>
        <div class="stat-value" id="delayedStat">0</div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Live Map</h2></div>
      <div id="map"></div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Shipments</h2></div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Route</th>
            <th>Status</th>
            <th>ETA</th>
            <th>Docs</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Add Shipment</h2>

    <div class="doc-upload-box">
      <input id="docUpload" type="file" multiple>
      <div id="docList">No documents</div>
    </div>

    <input id="client" placeholder="Customer">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">
    <input id="eta" type="date">

    <button id="saveBtn">Save</button>
  </div>
</div>
<script>
const sb = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

const BUCKET = "shipment-documents";

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

const users = [
  { name:"Gerard Hall", email:"gerard.hall@mauriceward.com", admin:true },
  { name:"Balazs Bekes", email:"balazs.bekes@mauriceward.com", admin:true },
  { name:"Ashley Nason", email:"ashley.nason@mauriceward.com" },
  { name:"Lisa O'Neill", email:"lisa.oneill@mauriceward.com" },
  { name:"Damian Halpin", email:"damian.halpin@mauriceward.com" },
  { name:"Jason O'Neill", email:"jason.o.neill@mauriceward.com" },
  { name:"Ciara Burns", email:"ciara.burns@mauriceward.com" },
  { name:"Dominic Martins", email:"dominic.martins@mauriceward.com" },
  { name:"Roisin Hogan", email:"roisin.hogan@mauriceward.com" },
  { name:"Lee Hodges", email:"lee.hodges@mauriceward.com" },
  { name:"Allanah O'Brien", email:"allanah.obrien@mauriceward.com" },
  { name:"Darragh O Neill", email:"darragh.oneill@mauriceward.com" },
  { name:"Tea Pitanti-Ivanac", email:"tea.pitanti-ivanac@mauriceward.com" },
  { name:"Gary Mc Gettrick", email:"gary.mcgettrick@mauriceward.com" },
  { name:"Eoin Ryan", email:"eoin.ryan@mauriceward.com" },
  { name:"Natacha Martins", email:"natacha.martins@mauriceward.com" }
];

let user = null;
let shipments = [];
let selectedDocs = [];
let map = null;
let mapLayer = null;
const geoCache = {};

const getVal = id => document.getElementById(id)?.value?.trim() || "";

function initials(email) {
  return String(email || "GK").slice(0, 2).toUpperCase();
}

function renderLoginUsers() {
  const select = document.getElementById("loginUserSelect");
  if (!select) return;

  select.innerHTML = `<option value="">Select user</option>` +
    users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

  select.onchange = () => {
    document.getElementById("loginEmail").value = select.value;
  };
}

function extractFirst(text, patterns) {
  for (const p of patterns) {
    const match = text.match(p);
    if (match && match[1]) return match[1].trim().replace(/\s+/g, " ");
  }
  return "";
}

function fillIfEmpty(id, value) {
  if (!value) return;
  const el = document.getElementById(id);
  if (el && !el.value) el.value = value;
}

function normaliseDate(value) {
  if (!value) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

  const parts = value.split(/[\/.-]/);
  if (parts.length !== 3) return "";

  let [d, m, y] = parts;
  if (y.length === 2) y = "20" + y;

  return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
}

async function readDocText(file) {
  if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    return text;
  }

  return await file.text();
}

function parseShipmentText(text) {
  const clean = text.replace(/\r/g, "\n");

  const etaRaw = extractFirst(clean, [
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{4}-[0-9]{2}-[0-9]{2})/i,
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{1,2}[\/.-][0-9]{1,2}[\/.-][0-9]{2,4})/i
  ]);

  const shipper = extractFirst(clean, [
    /(?:Shipper|Sender|Exporter)[:\s]+([^\n]+)/i
  ]);

  const consignee = extractFirst(clean, [
    /(?:Consignee|Receiver|Importer)[:\s]+([^\n]+)/i
  ]);

  const origin = extractFirst(clean, [
    /(?:Origin|From|POL|Port of Loading)[:\s]+([^\n]+)/i
  ]);

  const destination = extractFirst(clean, [
    /(?:Destination|To|POD|Port of Discharge)[:\s]+([^\n]+)/i
  ]);

  fillIfEmpty("client", consignee || shipper);
  fillIfEmpty("origin", origin);
  fillIfEmpty("destination", destination);
  fillIfEmpty("eta", normaliseDate(etaRaw));
}

function initDocUpload() {
  const input = document.getElementById("docUpload");
  const list = document.getElementById("docList");
  if (!input || !list) return;

  input.addEventListener("change", async e => {
    selectedDocs = Array.from(e.target.files || []);

    list.innerHTML = selectedDocs.length
      ? selectedDocs.map(f => "📄 " + f.name).join("<br>")
      : "No documents";

    for (const file of selectedDocs) {
      try {
        const text = await readDocText(file);
        parseShipmentText(text);
      } catch (err) {
        console.warn("Could not parse:", file.name, err);
      }
    }
  });
}

async function uploadSelectedDocs() {
  const urls = [];

  for (const file of selectedDocs) {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    const path = `${Date.now()}_${safeName}`;

    const { error } = await sb.storage.from(BUCKET).upload(path, file);

    if (error) {
      alert("Document upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

function initMap() {
  if (map) {
    map.invalidateSize();
    return;
  }

  map = L.map("map").setView([53.3498, -6.2603], 4);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  mapLayer = L.layerGroup().addTo(map);
  setTimeout(() => map.invalidateSize(), 300);
}

async function geocode(place) {
  if (!place) return [53.3498, -6.2603];

  const key = place.toLowerCase();
  if (geoCache[key]) return geoCache[key];

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(place)}`
    );
    const data = await res.json();

    if (data[0]) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[key] = coords;
      return coords;
    }
  } catch {}

  return [53.3498, -6.2603];
}

async function renderMap(data) {
  if (!mapLayer) return;

  mapLayer.clearLayers();
  const bounds = [];

  for (const x of data.slice(0, 10)) {
    const o = await geocode(x.origin);
    const d = await geocode(x.destination);

    bounds.push(o, d);

    L.marker(o).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.origin || ""}`);
    L.marker(d).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.destination || ""}`);

    L.polyline([o, d], {
      color: x.status === "Delivered" ? "green" : x.status === "Delayed" ? "red" : "#06b7a5",
      weight: 4,
      opacity: .85,
      dashArray: x.status === "In Transit" ? "8,8" : null
    }).addTo(mapLayer);
  }

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 6 });
  }
}

function statusClass(status) {
  if (status === "In Transit") return "transit";
  if (status === "Delayed") return "delayed";
  return "pending";
}

function renderRows(data) {
  shipments = data || [];

  document.getElementById("totalStat").textContent = shipments.length;
  document.getElementById("transitStat").textContent =
    shipments.filter(x => x.status === "In Transit").length;
  document.getElementById("delayedStat").textContent =
    shipments.filter(x => x.status === "Delayed").length;

  document.getElementById("rows").innerHTML = shipments.map(x => {
    const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

    return `
      <tr>
        <td>${x.shipment_ref || ""}</td>
        <td>${x.client || ""}</td>
        <td>${x.origin || ""} → ${x.destination || ""}</td>
        <td><span class="pill ${statusClass(x.status)}">${x.status || "Pending"}</span></td>
        <td>${x.eta || "-"}</td>
        <td>${docs.length ? docs.map((u, i) => `<a href="${u}" target="_blank">Doc ${i + 1}</a>`).join("<br>") : "-"}</td>
      </tr>
    `;
  }).join("");

  renderMap(shipments);
}

async function loadShipments() {
  const { data, error } = await sb
    .from("shipments")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Load error: " + error.message);
    return;
  }

  renderRows(data || []);
}

async function login() {
  const { data, error } = await sb.auth.signInWithPassword({
    email: getVal("loginEmail"),
    password: getVal("loginPassword")
  });

  if (error) {
    document.getElementById("loginError").textContent = error.message;
    return;
  }

  user = data.user;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "grid";
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("avatar").textContent = initials(user.email);

  initMap();
  await loadShipments();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

document.getElementById("loginBtn").onclick = login;
document.getElementById("logoutBtn").onclick = logout;

document.getElementById("openBtn").onclick = () => {
  document.getElementById("modal").classList.add("show");
};

document.getElementById("saveBtn").onclick = async () => {
  const documentUrls = await uploadSelectedDocs();

  const payload = {
    shipment_ref: "SHP" + Date.now(),
    client: getVal("client"),
    origin: getVal("origin"),
    destination: getVal("destination"),
    eta: getVal("eta") || null,
    shipment_type: "Air Import",
    status: "Pending",
    assigned_to: null,
    document_urls: documentUrls,
    created_by_email: user?.email || null,
    source: "manual"
  };

  if (!payload.client || !payload.origin || !payload.destination) {
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  const { error } = await sb.from("shipments").insert([payload]);

  if (error) {
    alert("Save error: " + error.message);
    return;
  }

  selectedDocs = [];
  document.getElementById("docUpload").value = "";
  document.getElementById("docList").innerHTML = "No documents";
  document.getElementById("client").value = "";
  document.getElementById("origin").value = "";
  document.getElementById("destination").value = "";
  document.getElementById("eta").value = "";

  document.getElementById("modal").classList.remove("show");
  await loadShipments();
};

renderLoginUsers();
initDocUpload();
</script>
</body>
</html>
