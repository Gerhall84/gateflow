<!DOCTYPE html>
<html>
<head>
  <title>GateKeeper</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h2>GateKeeper Shipments</h2>

<button onclick="openModal()">+ Add Shipment</button>

<table border="1" cellpadding="10" style="margin-top:20px;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Client</th>
      <th>Route</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<div id="modal" style="display:none; margin-top:20px;">
  <h3>Add Shipment</h3>

  <input id="client" placeholder="Client"><br><br>
  <input id="origin" placeholder="Origin"><br><br>
  <input id="destination" placeholder="Destination"><br><br>

  <select id="status">
    <option>Pending</option>
    <option>In Transit</option>
    <option>Delivered</option>
  </select><br><br>

  <button onclick="save()">Save</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

function openModal(){
  document.getElementById("modal").style.display = "block";
}

async function load(){
  const { data } = await supabase.from("shipments").select("*");

  document.getElementById("rows").innerHTML = data.map(x => `
    <tr>
      <td>${x.shipment_ref}</td>
      <td>${x.client}</td>
      <td>${x.origin} → ${x.destination}</td>
      <td>${x.status}</td>
    </tr>
  `).join("");
}

async function save(){
  await supabase.from("shipments").insert({
    shipment_ref: "SHP" + Date.now(),
    client: document.getElementById("client").value,
    origin: document.getElementById("origin").value,
    destination: document.getElementById("destination").value,
    status: document.getElementById("status").value
  });

  location.reload();
}

load();
</script>

</body>
</html>
