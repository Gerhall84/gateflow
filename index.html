<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f7fb;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #00a99d;
      color: white;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h2>GateKeeper Test</h2>

  <button onclick="openModal()">+ Add Shipment</button>

  <div id="modal" class="modal">
    <div class="box">
      <h3>Add Shipment</h3>
      <input placeholder="Client">
      <input placeholder="Origin">
      <input placeholder="Destination">
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("show");
    }
  </script>
</body>
