<!DOCTYPE html>
<html>
<head>
  <title>GateKeeper Working</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f5f7fb; }

    button {
      padding:10px 15px;
      border:none;
      border-radius:8px;
      background:#00a99d;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse: collapse;
      background:white;
    }

    th, td {
      padding:10px;
      border:1px solid #ddd;
    }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      align-items:center;
      justify-content:center;
    }

    .modal.show { display:flex; }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    input, select {
      width:100%;
      margin-bottom:10px;
      padding:8px;
    }
  </style>
</head>

<body>

<h2>GateKeeper Shipments</h2>

<button onclick="openModal()">+ Add Shipment</button>

<div id="status"></div>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Client</th>
      <th>Route</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<div id="modal" class="modal">
  <div class="box">
    <h3>Add Shipment</h3>

    <input id="client" placeholder="Client">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">

    <select id="statusField">
      <option>Pending</option>
      <option>In Transit</option>
      <option>Delivered</option>
    </select>

    <button onclick="save()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

function openModal() {
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

async function load() {
  const { data, error } = await supabase.from("shipments").select("*");

  if (error) {
    document.getElementById("status").innerText = "ERROR: " + error.message;
    return;
  }

  document.getElementById("rows").innerHTML = (data || []).map(x => `
    <tr>
      <td>${x.shipment_ref}</td>
      <td>${x.client}</td>
      <td>${x.origin} → ${x.destination}</td>
      <td>${x.status}</td>
    </tr>
  `).join("");
}

async function save() {
  const payload = {
    shipment_ref: "SHP" + Date.now(),
    client: document.getElementById("client").value,
    origin: document.getElementById("origin").value,
    destination: document.getElementById("destination").value,
    shipment_type: "Road",
    status: document.getElementById("statusField").value,
    priority: "Medium"
  };

  const { error } = await supabase.from("shipments").insert([payload]);

  if (error) {
    alert("SAVE ERROR: " + error.message);
    return;
  }

  closeModal();
  load();
}

load();
</script>

</body>
</html>
