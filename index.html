<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GateFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
}

.sidebar {
    width: 240px;
    height: 100vh;
    background: #0f172a;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #cbd5f5;
    text-decoration: none;
    margin: 15px 0;
}

.main {
    margin-left: 260px;
    padding: 20px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.button {
    background: #2563eb;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-top: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 400px;
    margin: 100px auto;
    border-radius: 12px;
}

input {
    width: 100%;
    margin: 8px 0;
    padding: 8px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>GateFlow</h2>
    <a href="#">Dashboard</a>
    <a href="#">Shipments</a>
    <a href="#">Quotation</a>
    <a href="#">Team</a>
</div>

<div class="main">

    <div class="topbar">
        <h1>Dashboard</h1>
        <div class="button" onclick="openModal()">+ Add Shipment</div>
    </div>

    <div class="card">
        <h3>Shipments</h3>
        <table id="shipmentTable">
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Route</th>
                <th>Status</th>
            </tr>
        </table>
    </div>

    <div class="card">
        <h3>Calendar (ETD / Pickup)</h3>
        <p>Calendar integration coming next phase</p>
    </div>

    <div class="card">
        <h3>Jobs</h3>
        <p>Assigned / Unassigned jobs coming next</p>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="shipmentModal">
    <div class="modal-content">
        <h3>Add Shipment</h3>

        <input type="text" id="client" placeholder="Client Name">
        <input type="text" id="route" placeholder="Route (Dublin → NYC)">
        <input type="text" id="status" placeholder="Status">

        <div class="button" onclick="addShipment()">Save</div>
    </div>
</div>

<script>

let shipments = [];

function openModal() {
    document.getElementById('shipmentModal').style.display = 'block';
}

function addShipment() {

    const client = document.getElementById('client').value;
    const route = document.getElementById('route').value;
    const status = document.getElementById('status').value;

    const id = "SHP" + Math.floor(Math.random()*10000);

    shipments.push({id, client, route, status});

    renderTable();

    document.getElementById('shipmentModal').style.display = 'none';
}

function renderTable() {

    const table = document.getElementById('shipmentTable');

    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Client</th>
            <th>Route</th>
            <th>Status</th>
        </tr>
    `;

    shipments.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.id}</td>
                <td>${s.client}</td>
                <td>${s.route}</td>
                <td>${s.status}</td>
            </tr>
        `;
    });
}

</script>

</body>
</html>
