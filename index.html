<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Shipments</title>

  <!-- ✅ ONLY ONE Supabase script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f7fb;
      margin: 0;
    }

    h2 { margin-bottom: 16px; }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #00a99d;
      color: white;
      cursor: pointer;
    }

    .secondary { background: #888; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }

    .modal.show { display: flex; }

    .modal-box {
      background: white;
      width: 360px;
      padding: 20px;
      border-radius: 12px;
    }

    .modal-box input,
    .modal-box select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    #statusMsg {
      margin-top: 12px;
      color: #333;
    }
  </style>
</head>

<body>

  <h2>GateKeeper Shipments</h2>

  <button id="openBtn">+ Add Shipment</button>
  <div id="statusMsg">Loading...</div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Route</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <h3>Add Shipment</h3>

      <input id="client" placeholder="Client">
      <input id="origin" placeholder="Origin">
      <input id="destination" placeholder="Destination">

      <select id="status">
        <option>Pending</option>
        <option>In Transit</option>
        <option>Delivered</option>
        <option>Delayed</option>
      </select>

      <div class="actions">
        <button class="secondary" id="cancelBtn">Cancel</button>
        <button id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- ✅ SCRIPT (clean, no duplicates) -->
  <script>
    console.log("APP START");

    const sb = window.supabase.createClient(
      "https://edxgkwkdgvsajfmkejbk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
    );

    const modal = document.getElementById("modal");
    const openBtn = document.getElementById("openBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const saveBtn = document.getElementById("saveBtn");
    const rows = document.getElementById("rows");
    const statusMsg = document.getElementById("statusMsg");

    openBtn.onclick = () => {
      modal.classList.add("show");
      statusMsg.textContent = "Modal opened";
    };

    cancelBtn.onclick = () => {
      modal.classList.remove("show");
    };

    modal.onclick = (e) => {
      if (e.target === modal) modal.classList.remove("show");
    };

    async function loadShipments() {
      statusMsg.textContent = "Loading shipments...";

      const { data, error } = await sb
        .from("shipments")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        statusMsg.textContent = "LOAD ERROR: " + error.message;
        return;
      }

      rows.innerHTML = (data || []).map(x => `
        <tr>
          <td>${x.shipment_ref}</td>
          <td>${x.client}</td>
          <td>${x.origin} → ${x.destination}</td>
          <td>${x.status}</td>
        </tr>
      `).join("");

      statusMsg.textContent = "Loaded " + (data?.length || 0) + " shipments";
    }

    saveBtn.onclick = async () => {
      const client = document.getElementById("client").value;
      const origin = document.getElementById("origin").value;
      const destination = document.getElementById("destination").value;
      const status = document.getElementById("status").value;

      if (!client || !origin || !destination) {
        statusMsg.textContent = "Fill all fields";
        return;
      }

      const { error } = await sb.from("shipments").insert([{
        shipment_ref: "SHP" + Date.now(),
        client,
        origin,
        destination,
        shipment_type: "Road",
        status,
        priority: "Medium"
      }]);

      if (error) {
        statusMsg.textContent = "SAVE ERROR: " + error.message;
        return;
      }

      modal.classList.remove("show");
      statusMsg.textContent = "Saved successfully";
      loadShipments();
    };

    loadShipments();
  </script>

</body>
</html>
