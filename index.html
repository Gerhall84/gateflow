<head>

  <title>GateKeeper Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:#f4f7f8;
      --nav:#04142e;
      --text:#11213d;
      --muted:#6f7d93;
      --brand:#06b7a5;
      --brand-dark:#069788;
      --line:#e4ebed;
      --danger:#ef5c5c;
      --success:#18a66e;
      --warning:#f0a227;
      --blue:#2d79ff;
      --shadow:0 25px 60px rgba(6,20,46,0.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#f4f7f8 0%,#eef4f5 100%);
      color:var(--text);
    }

    button { font-family:inherit; }

    .login-screen {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#04142e,#063b63);
      padding:20px;
    }

    .login-card {
      width:100%;
      max-width:420px;
      background:white;
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }

    .login-card img {
      display:block;
      max-width:190px;
      margin:0 auto 20px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .login-card h1 {
      text-align:center;
      margin:0 0 8px;
      color:var(--nav);
    }

    .login-card p {
      text-align:center;
      margin:0 0 24px;
      color:var(--muted);
    }

    .login-card input {
      width:100%;
      height:48px;
      margin-bottom:12px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:0 14px;
      font-size:15px;
    }

    .login-error {
      color:var(--danger);
      font-size:13px;
      margin-top:12px;
      text-align:center;
    }

    .app {
      display:none;
      min-height:100vh;
      grid-template-columns:250px 1fr;
    }

    .sidebar {
      background:linear-gradient(180deg,#04142e,#021127);
      color:white;
      padding:26px 16px;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      box-shadow:4px 0 30px rgba(0,0,0,.25);
    }

    .brand {
      text-align:center;
      padding:10px 8px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand img {
      max-width:180px;
      margin-bottom:12px;
      filter:drop-shadow(0 10px 30px rgba(6,183,165,.35));
    }

    .brand strong {
      display:block;
      color:#3f73e8;
      font-size:14px;
    }

    .nav a {
      display:flex;
      color:white;
      padding:14px;
      border-radius:16px;
      font-weight:700;
      margin-bottom:8px;
      text-decoration:none;
      cursor:pointer;
    }

    .nav a.active,
    .nav a:hover {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .side-label {
      color:rgba(255,255,255,.45);
      font-size:11px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      margin:18px 12px 10px;
    }

    .type-nav button {
      width:100%;
      text-align:left;
      background:transparent;
      color:white;
      border:0;
      padding:11px 14px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
      margin-bottom:5px;
    }

    .type-nav button:hover,
    .type-nav button.active {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .sidebar-footer {
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
    }

    .avatar {
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:white;
    }

    .main { padding:28px; }

    .welcome { margin-bottom:18px; }

    .welcome h1 {
      margin:0 0 8px;
      font-size:28px;
    }

    .welcome p {
      margin:0;
      color:var(--muted);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-left,
    .topbar-right {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .primary-btn {
      height:46px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:white;
      padding:0 22px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 30px rgba(6,183,165,.3);
    }

    .secondary-btn {
      height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--text);
      padding:0 20px;
      font-weight:800;
      cursor:pointer;
    }

    .secondary-btn.active {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }

    .type-filter-bar {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .type-chip {
      height:40px;
      border:1px solid var(--line);
      background:white;
      border-radius:999px;
      padding:0 14px;
      font-weight:900;
      cursor:pointer;
      color:var(--text);
      box-shadow:0 10px 25px rgba(6,20,46,.04);
    }

    .type-chip.active,
    .type-chip:hover {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }

    .action-btn {
      border:0;
      border-radius:12px;
      padding:9px 11px;
      margin-right:6px;
      cursor:pointer;
      background:#f4f7f8;
    }

    <script>
const sb = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

// ---------- CONFIG ----------
const BUCKET = "shipment-documents";

// ---------- USERS ----------
const users = [
  { name:"Gerard Hall", email:"gerard.hall@mauriceward.com", admin:true },
  { name:"Balazs Bekes", email:"balazs.bekes@mauriceward.com", admin:true },
  { name:"Ashley Nason", email:"ashley.nason@mauriceward.com" },
  { name:"Lisa O'Neill", email:"lisa.oneill@mauriceward.com" },
  { name:"Damian Halpin", email:"damian.halpin@mauriceward.com" },
  { name:"Jason O'Neill", email:"jason.o.neill@mauriceward.com" },
  { name:"Ciara Burns", email:"ciara.burns@mauriceward.com" },
  { name:"Dominic Martins", email:"dominic.martins@mauriceward.com" },
  { name:"Roisin Hogan", email:"roisin.hogan@mauriceward.com" },
  { name:"Lee Hodges", email:"lee.hodges@mauriceward.com" },
  { name:"Allanah O'Brien", email:"allanah.obrien@mauriceward.com" },
  { name:"Darragh O Neill", email:"darragh.oneill@mauriceward.com" },
  { name:"Tea Pitanti-Ivanac", email:"tea.pitanti-ivanac@mauriceward.com" },
  { name:"Gary Mc Gettrick", email:"gary.mcgettrick@mauriceward.com" },
  { name:"Eoin Ryan", email:"eoin.ryan@mauriceward.com" },
  { name:"Natacha Martins", email:"natacha.martins@mauriceward.com" }
];

// ---------- TYPES ----------
const shipmentTypes = [
  "All",
  "Air Import","Air Export",
  "Ocean Import","Ocean Export",
  "Road Import","Road Export","Road Domestic",
  "Customs Clearance"
];

// ---------- STATE ----------
let user=null, shipments=[], showMine=false, editingId=null;
let uploadedFiles=[], uploadedUrls=[];

// ---------- HELPERS ----------
const getVal=id=>document.getElementById(id).value.trim();
const setVal=(id,v)=>document.getElementById(id).value=v||"";

// ---------- UI ----------
function renderUserDropdown(){
  const el=document.getElementById("assigned");
  el.innerHTML=`<option value="">Unassigned</option>` +
    users.map(u=>`<option value="${u.email}">${u.name}</option>`).join("");
}

// ---------- DROP ZONE ----------
const dropZone=document.getElementById("dropZone");
const docUpload=document.getElementById("docUpload");
const docList=document.getElementById("docList");

dropZone.onclick=()=>docUpload.click();

dropZone.ondragover=e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
};

dropZone.ondragleave=()=>dropZone.classList.remove("dragover");

dropZone.ondrop=e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFiles(e.dataTransfer.files);
};

docUpload.onchange=e=>handleFiles(e.target.files);

function handleFiles(files){
  for(const f of files){
    uploadedFiles.push(f);
  }
  renderFileList();
  parseFiles(files);
}

function renderFileList(){
  if(!uploadedFiles.length){
    docList.innerHTML="No documents uploaded.";
    return;
  }

  docList.innerHTML=uploadedFiles.map(f=>`📄 ${f.name}`).join("<br>");
}

// ---------- PARSER ----------
function extract(text, patterns){
  for(const p of patterns){
    const m=text.match(p);
    if(m&&m[1]) return m[1].trim();
  }
  return "";
}

function parseText(text){
  setVal("awbNumber", extract(text,[/awb[:\s]+([A-Z0-9\-]+)/i,/waybill[:\s]+([A-Z0-9\-]+)/i]));
  setVal("carrier", extract(text,[/carrier[:\s]+([^\n]+)/i,/courier[:\s]+([^\n]+)/i]));
  setVal("pieces", extract(text,[/pieces[:\s]+(\d+)/i]));
  setVal("weight", extract(text,[/weight[:\s]+([0-9\.]+\s?[A-Z]*)/i]));
  setVal("shipper", extract(text,[/shipper[:\s]+([^\n]+)/i]));
  setVal("consignee", extract(text,[/consignee[:\s]+([^\n]+)/i]));

  if(!getVal("client")){
    setVal("client", getVal("consignee"));
  }
}

async function readFile(file){
  if(file.type==="application/pdf"){
    const buffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buffer}).promise;
    let text="";
    for(let i=1;i<=pdf.numPages;i++){
      const p=await pdf.getPage(i);
      const c=await p.getTextContent();
      text+=c.items.map(i=>i.str).join(" ")+"\n";
    }
    return text;
  }
  return await file.text();
}

async function parseFiles(files){
  for(const f of files){
    try{
      const text=await readFile(f);
      parseText(text);
    }catch{}
  }
}

// ---------- UPLOAD ----------
async function uploadDocs(){
  uploadedUrls=[];

  for(const file of uploadedFiles){
    const path=`${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from(BUCKET).upload(path,file);
    if(!error){
      const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
      uploadedUrls.push(data.publicUrl);
    }
  }
}

// ---------- SAVE ----------
document.getElementById("saveBtn").onclick=async()=>{
  await uploadDocs();

  const payload={
    client:getVal("client"),
    origin:getVal("origin"),
    destination:getVal("destination"),
    assigned_to:getVal("assigned")||null,
    shipment_type:getVal("shipmentType"),
    awb_number:getVal("awbNumber"),
    carrier:getVal("carrier"),
    pieces:getVal("pieces"),
    weight:getVal("weight"),
    shipper:getVal("shipper"),
    consignee:getVal("consignee"),
    pickup_date:getVal("pickupDate")||null,
    etd:getVal("etdDate")||null,
    eta:getVal("eta")||null,
    status:getVal("status"),
    document_urls:uploadedUrls
  };

  if(!payload.client||!payload.origin||!payload.destination){
    alert("Fill core fields");
    return;
  }

  if(editingId){
    await sb.from("shipments").update(payload).eq("id",editingId);
  }else{
    await sb.from("shipments").insert([{
      ...payload,
      shipment_ref:"SHP"+Date.now()
    }]);
  }

  uploadedFiles=[];
  uploadedUrls=[];
  docList.innerHTML="No documents uploaded.";
  document.getElementById("modal").classList.remove("show");
  loadShipments();
};

// ---------- TABLE ----------
function renderRows(){
  const data = showMine
    ? shipments.filter(x=>x.assigned_to===user.email)
    : shipments;

  document.getElementById("rows").innerHTML=data.map(x=>`
    <tr>
      <td>${x.shipment_ref||""}</td>
      <td>${x.client||""}</td>
      <td>${x.shipment_type||""}</td>
      <td>${x.awb_number||""}</td>
      <td>${x.origin} → ${x.destination}</td>
      <td>${x.status}</td>
      <td>${x.eta||"-"}</td>
      <td>${(x.document_urls||[]).map(u=>`<a href="${u}" target="_blank">Doc</a>`).join(" ")}</td>
      <td>${x.assigned_to||"-"}</td>
      <td>
        <button onclick="editShipment('${x.id}')">✏️</button>
      </td>
    </tr>
  `).join("");

  renderUnassigned();
}

// ---------- UNASSIGNED ----------
function renderUnassigned(){
  const list=shipments.filter(x=>!x.assigned_to);

  document.getElementById("unassignedBox").innerHTML=
    list.map(x=>`
      <div class="unassigned-card">
        <strong>${x.client}</strong>
        <small>${x.origin} → ${x.destination}</small><br>
        <button class="primary-btn" onclick="takeShipment('${x.id}')">Take</button>
      </div>
    `).join("");
}

async function takeShipment(id){
  await sb.from("shipments")
    .update({assigned_to:user.email})
    .eq("id",id);

  loadShipments();
}

// ---------- LOAD ----------
async function loadShipments(){
  const {data}=await sb.from("shipments").select("*");
  shipments=data||[];
  renderRows();
}

// ---------- LOGIN ----------
document.getElementById("loginBtn").onclick=async()=>{
  const {data,error}=await sb.auth.signInWithPassword({
    email:getVal("loginEmail"),
    password:getVal("loginPassword")
  });
  if(error){alert(error.message);return;}
  user=data.user;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="grid";
  loadShipments();
};

// ---------- BUTTONS ----------
document.getElementById("openBtn").onclick=()=>{
  document.getElementById("modal").classList.add("show");
};

document.getElementById("cancelBtn").onclick=()=>{
  document.getElementById("modal").classList.remove("show");
};

document.getElementById("myBtn").onclick=()=>{
  showMine=!showMine;
  renderRows();
};

// ---------- INIT ----------
renderUserDropdown();
</script>
</body>
