<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --nav:#04142e;
      --text:#11213d;
      --muted:#6f7d93;
      --brand:#06b7a5;
      --brand-dark:#069788;
      --line:#e4ebed;
      --danger:#ef5c5c;
      --success:#18a66e;
      --warning:#f0a227;
      --blue:#2d79ff;
      --shadow:0 25px 60px rgba(6,20,46,0.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#f4f7f8,#eef4f5);
      color:var(--text);
    }

    button { font-family:inherit; cursor:pointer; }

    .login-screen {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#04142e,#063b63);
      padding:20px;
    }

    .login-card {
      width:100%;
      max-width:430px;
      background:white;
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }

    .login-card img {
      display:block;
      max-width:200px;
      margin:0 auto 20px;
    }

    .login-card h1 {
      text-align:center;
      margin:0 0 8px;
      color:var(--nav);
    }

    .login-card p {
      text-align:center;
      margin:0 0 24px;
      color:var(--muted);
    }

    input, select {
      width:100%;
      height:46px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 12px;
      margin-bottom:10px;
      background:white;
    }

    .login-error {
      color:var(--danger);
      font-size:13px;
      text-align:center;
      margin-top:10px;
    }

    .app {
      display:none;
      min-height:100vh;
      grid-template-columns:250px 1fr;
    }

    .sidebar {
      background:linear-gradient(180deg,#04142e,#021127);
      color:white;
      padding:26px 16px;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      box-shadow:4px 0 30px rgba(0,0,0,.25);
    }

    .brand {
      text-align:center;
      padding:10px 8px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand img {
      max-width:180px;
      margin-bottom:12px;
    }

    .brand strong {
      color:#3f73e8;
      font-size:14px;
    }

    .nav a {
      display:flex;
      color:white;

      font-weight:700;

    }

    .nav a.active,

    .side-label {

      text-transform:uppercase;

    .type-nav button {
      width:100%;
      text-align:left;

      border:0;
      padding:11px 14px;
      border-radius:14px;

    .type-nav button:hover,

      background:rgba(6,183,165,.18);

    }
        .sidebar-footer {
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
      font-size:12px;

    .avatar {

      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));

      align-items:center;
      justify-content:center;
      font-weight:900;
    }

    .main { padding:28px; }

    .welcome h1 {
      margin:0 0 8px;

    }

    .welcome p {
      margin:0 0 18px;
      color:var(--muted);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-left,
    .topbar-right {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .primary-btn {
      height:46px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:white;
      padding:0 22px;
      font-weight:900;
      box-shadow:0 12px 30px rgba(6,183,165,.3);
    }

    .secondary-btn {
      height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--text);
      padding:0 20px;
      font-weight:800;
    }

    .secondary-btn.active {

      color:var(--brand-dark);

    }

    .type-filter-bar {
      display:flex;
      gap:10px;

      margin-bottom:16px;
    }

    .type-chip {
      height:40px;
      border:1px solid var(--line);
      background:white;
      border-radius:999px;
      padding:0 14px;
      font-weight:900;
      color:var(--text);
      box-shadow:0 10px 25px rgba(6,20,46,.04);
    }

    .type-chip.active,
    .type-chip:hover {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }

    .stats {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:16px;
    }

    .card {
      background:white;
      border-radius:22px;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.03);
      overflow:hidden;
      margin-bottom:16px;
    }

    .stat-card { padding:22px; }

    .stat-label {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }

    .stat-value {
      font-size:30px;
      font-weight:900;
    }

    .grid {
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:16px;
      margin-bottom:16px;
    }

    .section-head {
      padding:20px 20px 12px;
      border-bottom:1px solid var(--line);
    }

    .section-head h2 {
      margin:0;
      color:var(--brand-dark);
      font-size:18px;
    }

    #map {
      height:420px;
      border-radius:18px;
      margin:16px;
    }

    .timeline {
      padding:16px;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
    }

    .timeline-day {
      background:#f8fbfc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      min-height:140px;
      font-size:12px;
    }

    .timeline-day strong {
      display:block;
      margin-bottom:8px;
    }

    .timeline-item {
      margin-top:8px;
      padding:8px;
      border-left:4px solid var(--brand);
      background:white;
      border-radius:8px;
    }

  tr.row-risk {
  background:#fff4e0;
  border-left:6px solid #f0a227;
}

    .timeline-item.overdue {
  border-left-color:#ef5c5c;
  background:#ffecec;
  font-weight:700;
}

.timeline-item.risk {
  border-left-color:#f0a227;
  background:#fff4e0;
}
{
      border-left-color:var(--danger);
      background:#fff3f3;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:12px;
      border-bottom:1px solid var(--line);
      vertical-align:top;
      text-align:left;
      font-size:13px;
    }

    th { background:#f6f9fb; }

    tr.row-risk {
      background:#fff9f0;
    }

    tr.row-overdue {
  background:#ffe4e4;
  border-left:6px solid #ef5c5c;
  font-weight:700;
}

tr.row-risk {
  background:#fff4e0;
  border-left:6px solid #f0a227;
}{
      background:#fff3f3;
    }

    .pill {
      display:inline-flex;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      margin:0 4px 4px 0;
    }

    .pending { background:#fff1da; color:#d88d10; }
    .transit { background:#dff7f3; color:#069788; }
    .delivered { background:#dff5eb; color:#18a66e; }
    .delayed { background:#ffe4e4; color:#ef5c5c; }
    .type-pill { background:#e4f0ff; color:#2d79ff; }
    .risk-pill { background:#fff1da; color:#d88d10; }
    .overdue-pill { background:#ffe4e4; color:#ef5c5c; }

    .action-btn {
      border:0;
      border-radius:12px;
      padding:9px 11px;
      margin:2px;
      background:#f4f7f8;
    }

    .unassigned-card {
      border-bottom:1px solid var(--line);
      padding:12px 16px;
      font-size:13px;
    }

    .doc-link {
      color:var(--brand-dark);
      font-weight:800;
      text-decoration:none;
      display:block;
      margin-bottom:4px;
    }
        .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(3,12,28,.6);
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .modal.show { display:flex; }

    .modal-box {
      width:min(760px,100%);
      background:white;
      border-radius:22px;
      padding:24px;
      box-shadow:0 30px 80px rgba(2,17,39,.28);
      max-height:90vh;
      overflow:auto;
    }

    .modal-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .doc-upload-box {
      border:2px dashed var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      background:#fbfdfd;
      text-align:center;
    }

    .doc-list {
      font-size:13px;
      color:var(--muted);
      margin-bottom:12px;
    }

    .modal-actions {
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:10px;
    }

    @media(max-width:900px){
      .app { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .grid,.stats,.timeline,.modal-grid { grid-template-columns:1fr; }
      .main { padding:16px; }
    }
  </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="logo.png">
    <h1>GateKeeper</h1>
    <p>Operations Control</p>
    <select id="loginUserSelect"></select>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button class="primary-btn" id="loginBtn">Login</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png">
      <strong>Operations</strong>
    </div>

    <div class="side-label">Shipment Types</div>
    <div class="type-nav" id="sideTypeFilters"></div>

    <div class="sidebar-footer">
      <div class="avatar" id="avatar">GK</div>
      <div id="userEmail"></div>
    </div>
  </aside>

  <main class="main">

    <div class="topbar">
      <div class="topbar-left">
        <button class="primary-btn" id="openBtn">+ Add Shipment</button>
        <button class="secondary-btn" id="myBtn">My Shipments</button>
      </div>
      <div class="topbar-right">
        <button class="secondary-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="typeFilters" class="type-filter-bar"></div>

    <section class="stats">
      <div class="card stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="totalStat">0</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">In Transit</div>
        <div class="stat-value" id="transitStat">0</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">At Risk</div>
        <div class="stat-value" id="riskStat">0</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value" id="overdueStat">0</div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Weekly Timeline</h2></div>
      <div class="timeline" id="timeline"></div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="section-head"><h2>Live Map</h2></div>
        <div id="map"></div>
      </div>

      <div class="card">
        <div class="section-head"><h2>Unassigned</h2></div>
        <div id="unassigned"></div>
      </div>
    </section>

    <section class="card">
      <div class="section-head"><h2>Shipments</h2></div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Type</th>
            <th>Route</th>
            <th>Status</th>
            <th>ETA</th>
            <th>Docs</th>
            <th>Assigned</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2>Add Shipment</h2>

    <div class="doc-upload-box">
      <input id="docUpload" type="file" multiple>
      <div id="docList" class="doc-list">No documents</div>
    </div>

    <div class="modal-grid">
      <input id="client" placeholder="Customer">
      <input id="origin" placeholder="Origin">
      <input id="destination" placeholder="Destination">
      <input id="awb" placeholder="AWB">
      <input id="carrier" placeholder="Carrier">
      <input id="pieces" placeholder="Pieces">
      <input id="weight" placeholder="Weight">
      <input id="shipper" placeholder="Shipper">
      <input id="consignee" placeholder="Consignee">
      <input id="eta" type="date">
      <select id="assigned"></select>
      <select id="shipmentType"></select>
    </div>

    <div class="modal-actions">
      <button class="secondary-btn" id="autoCreateBtn">Auto Create</button>
      <button class="secondary-btn" id="cancelBtn">Cancel</button>
      <button class="primary-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>
<script>
const sb = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

const BUCKET = "shipment-documents";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const shipmentTypes = [
  "All",
  "Air Import","Air Export",
  "Ocean Import","Ocean Export",
  "Road Import","Road Export",
  "Road Domestic","Customs Clearance"
];

const users = [
  { name:"Gerard Hall", email:"gerard.hall@mauriceward.com" },
  { name:"Balazs Bekes", email:"balazs.bekes@mauriceward.com" }
];

let user = null;
let shipments = [];
let selectedDocs = [];
let editingId = null;
let existingDocs = [];
let showMine = false;
let typeFilter = "All";

const getVal = id => document.getElementById(id)?.value || "";
const setVal = (id,val)=>{ if(val && !getVal(id)) document.getElementById(id).value = val; };

function localDateOnly(d){ return d ? d.slice(0,10) : ""; }

// ---------------- RISK ENGINE ----------------
function getRiskLevel(shipment){
  if(!shipment.eta) return "none";

  const today = new Date();
  today.setHours(0,0,0,0);

  const eta = new Date(shipment.eta);
  eta.setHours(0,0,0,0);

  const diff = (eta - today) / (1000*60*60*24);

  if(diff < 0 && shipment.status !== "Delivered"){
    if(shipment.status !== "Delayed"){
      autoMarkDelayed(shipment.id);
    }
    return "overdue";
  }

  if(diff <= 2) return "risk";
  return "none";
}
// ---------------- LOGIN ----------------
document.getElementById("loginBtn").onclick = async () => {
  const { data,error } = await sb.auth.signInWithPassword({
    email:getVal("loginEmail"),
    password:getVal("loginPassword")
  });
  if(error) return alert(error.message);

  user = data.user;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="grid";
  document.getElementById("userEmail").textContent=user.email;

  loadShipments();
};

// ---------------- LOAD ----------------
async function loadShipments(){
  const { data } = await sb.from("shipments").select("*");
  shipments = data || [];
  render();
}

// ---------------- FILTERS ----------------
function renderTypeFilters(){
  document.getElementById("typeFilters").innerHTML =
    shipmentTypes.map(t => `
      <button class="secondary-btn ${typeFilter===t?"active":""}"
        onclick="setTypeFilter('${t}')">${t}</button>
    `).join("");
}

function setTypeFilter(t){
  typeFilter = t;
  renderTypeFilters();
  render();
}
function filteredShipments(){
  let data = [...shipments];

  if(showMine){
    data = data.filter(x => x.assigned_to === user?.email);
  }

  if(typeFilter !== "All"){
    data = data.filter(x => x.shipment_type === typeFilter);
  }

  return data;
}

function render(){
  const data = filteredShipments();

  document.getElementById("totalStat").textContent = data.length;
  document.getElementById("transitStat").textContent = data.filter(x => x.status === "In Transit").length;
  document.getElementById("riskStat").textContent = data.filter(x => getRiskLevel(x) === "risk").length;
  document.getElementById("overdueStat").textContent = data.filter(x => getRiskLevel(x) === "overdue").length;

  document.getElementById("rows").innerHTML = data.map(x => {
    const risk = getRiskLevel(x);
    const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

    return `
      <tr class="${risk === "overdue" ? "row-overdue" : risk === "risk" ? "row-risk" : ""}">
        <td>${x.shipment_ref || ""}</td>
        <td>${x.client || ""}<br><small>${x.awb_number || ""}</small></td>
        <td><span class="pill type-pill">${x.shipment_type || ""}</span></td>
        <td>${x.origin || ""} → ${x.destination || ""}</td>
        <td>
          <span class="pill ${x.status === "In Transit" ? "transit" : x.status === "Delivered" ? "delivered" : x.status === "Delayed" ? "delayed" : "pending"}">
            ${x.status || "Pending"}
          </span>
          ${risk === "risk" ? `<span class="pill risk-pill">At Risk</span>` : ""}
        ${risk === "overdue" ? `<span class="pill overdue-pill">⚠ OVERDUE</span>` : ""}
${risk === "risk" ? `<span class="pill risk-pill">⚠ AT RISK</span>` : ""}
        </td>
        <td>${localDateOnly(x.eta) || "-"}</td>
        <td>${docs.length ? docs.map((u,i)=>`<a class="doc-link" href="${u}" target="_blank">Doc ${i+1}</a>`).join("") : "-"}</td>
        <td>${x.assigned_to || "Unassigned"}</td>
        <td>
          <button class="action-btn" onclick="editShipment('${x.id}')">✏️</button>
          <button class="action-btn" onclick="setStatus('${x.id}','In Transit')">🚚</button>
          <button class="action-btn" onclick="setStatus('${x.id}','Delivered')">✅</button>
          <button class="action-btn" onclick="deleteShipment('${x.id}')">🗑️</button>
        </td>
      </tr>
    `;
  }).join("");

  renderTimeline(data);
  renderUnassigned();
}
async function autoMarkDelayed(id){
  await sb
    .from("shipments")
    .update({ status: "Delayed" })
    .eq("id", id);
}
function renderTimeline(data){
  const box = document.getElementById("timeline");
  const today = new Date();
  today.setHours(0,0,0,0);

  const days = Array.from({length:7},(_,i)=>{
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    return d;
  });

  box.innerHTML = days.map(day => {
    const key = day.getFullYear()+"-"+String(day.getMonth()+1).padStart(2,"0")+"-"+String(day.getDate()).padStart(2,"0");

    const events = data.filter(x => localDateOnly(x.eta) === key);

    return `
      <div class="timeline-day">
        <strong>${day.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}</strong>
        ${events.length ? events.map(x => {
          const risk = getRiskLevel(x);
          return `
            <div class="timeline-item ${risk === "overdue" ? "overdue" : risk === "risk" ? "risk" : ""}">
              <b>${x.client || "No customer"}</b><br>
              <small>${x.shipment_ref || ""}</small><br>
              <small>${x.origin || ""} → ${x.destination || ""}</small>
            </div>
          `;
        }).join("") : `<small>No events</small>`}
      </div>
    `;
  }).join("");
}

function renderUnassigned(){
  const box = document.getElementById("unassigned");
  const list = shipments.filter(x => !x.assigned_to);

  box.innerHTML = list.length ? list.map(x => `
    <div class="unassigned-card">
      <strong>${x.client || "No customer"}</strong><br>
      ${x.origin || ""} → ${x.destination || ""}<br>
      <button class="primary-btn" style="height:34px;margin-top:8px;" onclick="takeShipment('${x.id}')">Take</button>
    </div>
  `).join("") : `<div style="padding:16px;color:#6f7d93;">No unassigned shipments</div>`;
}

async function takeShipment(id){
  await sb.from("shipments").update({assigned_to:user.email}).eq("id",id);
  await loadShipments();
}

async function setStatus(id,status){
  await sb.from("shipments").update({status}).eq("id",id);
  await loadShipments();
}

async function deleteShipment(id){
  if(!confirm("Delete this shipment?")) return;
  await sb.from("shipments").delete().eq("id",id);
  await loadShipments();
}

function editShipment(id){
  const x = shipments.find(s => s.id === id);
  if(!x) return;

  editingId = id;
  existingDocs = Array.isArray(x.document_urls) ? x.document_urls : [];

  document.getElementById("client").value = x.client || "";
  document.getElementById("origin").value = x.origin || "";
  document.getElementById("destination").value = x.destination || "";
  document.getElementById("awb").value = x.awb_number || "";
  document.getElementById("carrier").value = x.carrier || "";
  document.getElementById("pieces").value = x.pieces || "";
  document.getElementById("weight").value = x.weight || "";
  document.getElementById("shipper").value = x.shipper || "";
  document.getElementById("consignee").value = x.consignee || "";
  document.getElementById("eta").value = localDateOnly(x.eta);
  document.getElementById("assigned").value = x.assigned_to || "";
  document.getElementById("shipmentType").value = x.shipment_type || "Air Import";

  document.getElementById("modal").classList.add("show");
}

async function uploadDocs(){
  const urls = [];

  for(const file of selectedDocs){
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const path = Date.now() + "_" + safeName;

    const { error } = await sb.storage.from("shipment-documents").upload(path,file);
    if(error){
      alert("Upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage.from("shipment-documents").getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

async function saveShipment(){
  const newDocs = await uploadDocs();
  const docs = [...existingDocs, ...newDocs];

  const payload = {
    client:getVal("client"),
    origin:getVal("origin"),
    destination:getVal("destination"),
    awb_number:getVal("awb"),
    carrier:getVal("carrier"),
    pieces:getVal("pieces"),
    weight:getVal("weight"),
    shipper:getVal("shipper"),
    consignee:getVal("consignee"),
    eta:getVal("eta") || null,
    assigned_to:getVal("assigned") || null,
    shipment_type:getVal("shipmentType") || "Air Import",
    status:"Pending",
    document_urls:docs
  };

  if(!payload.client || !payload.origin || !payload.destination){
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  let error;

  if(editingId){
    const res = await sb.from("shipments").update(payload).eq("id",editingId);
    error = res.error;
  } else {
    const res = await sb.from("shipments").insert([{
      ...payload,
      shipment_ref:"SHP"+Date.now(),
      created_by_email:user?.email || null,
      source:"manual"
    }]);
    error = res.error;
  }

  if(error){
    alert("Save error: " + error.message);
    return;
  }

  editingId = null;
  existingDocs = [];
  selectedDocs = [];

  document.getElementById("modal").classList.remove("show");
  await loadShipments();
}

document.getElementById("saveBtn").onclick = saveShipment;
document.getElementById("cancelBtn").onclick = () => document.getElementById("modal").classList.remove("show");
document.getElementById("openBtn").onclick = () => document.getElementById("modal").classList.add("show");
document.getElementById("logoutBtn").onclick = async () => { await sb.auth.signOut(); location.reload(); };

document.getElementById("myBtn").onclick = () => {
  showMine = !showMine;
  document.getElementById("myBtn").classList.toggle("active", showMine);
  render();
};

document.getElementById("docUpload").onchange = e => {
  selectedDocs = Array.from(e.target.files || []);
  document.getElementById("docList").innerHTML = selectedDocs.length
    ? selectedDocs.map(f => "📄 " + f.name).join("<br>")
    : "No documents";
};

document.getElementById("assigned").innerHTML =
  `<option value="">Unassigned</option>` +
  users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

document.getElementById("shipmentType").innerHTML =
  shipmentTypes.filter(t => t !== "All").map(t => `<option>${t}</option>`).join("");

document.getElementById("loginUserSelect").innerHTML =
  `<option value="">Select user</option>` +
  users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

document.getElementById("loginUserSelect").onchange = e => {
  document.getElementById("loginEmail").value = e.target.value;
};

renderTypeFilters();
</script>
