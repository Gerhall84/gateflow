<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateFlow Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f4f7f8}
.login{display:flex;height:100vh;align-items:center;justify-content:center}
.card{background:white;padding:30px;border-radius:12px;width:320px}
input,button{width:100%;padding:10px;margin-top:10px}
.app{display:none}
.sidebar{width:220px;background:#04142e;color:white;height:100vh;float:left;padding:10px}
.nav{padding:12px;cursor:pointer}
.nav:hover{background:#0a1f43}
.content{margin-left:220px;padding:20px}
.kanban{display:flex;gap:12px}
.col{background:#eef4f5;padding:10px;border-radius:10px;width:250px}
.card-job{background:white;padding:10px;border-radius:8px;margin-bottom:8px;cursor:grab}
.vip{border-left:4px solid gold;background:#fff9e8}
.alert{background:#ffe4e4;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>GateFlow</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="msg"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="nav" onclick="view='dashboard';render()">Dashboard</div>
    <div class="nav" onclick="view='kanban';render()">Kanban</div>
    <div class="nav" onclick="view='bd';render()">BD Upload</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const SUPABASE_URL='https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_ANON_KEY='PASTE_KEY';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let user=null,view='dashboard';

async function login(){
 const {data,error}=await sb.auth.signInWithPassword({
  email:email.value,password:password.value
 });
 if(error){msg.innerText=error.message;return}
 user=data.user;start();
}

function start(){login.style.display='none';app.style.display='block';render()}

async function render(){
 if(view==='dashboard') dash();
 if(view==='kanban') kanban();
 if(view==='bd') bd();
}

async function dash(){
 const {data}=await sb.from('shipments').select('*');
 const mine=data.filter(s=>s.assigned_to===user.id);
 const unassigned=data.filter(s=>!s.assigned_to);
 const alerts=data.filter(s=>!s.assigned_to);
 content.innerHTML=`
 <h1>Dashboard</h1>
 <div class="alert">Unassigned: ${alerts.length}</div>
 <h3>My Shipments</h3>
 ${mine.map(s=>s.shipment_ref).join('<br>')}
 <h3>Unassigned</h3>
 ${unassigned.map(s=>s.shipment_ref).join('<br>')}
 `;
}

async function kanban(){
 const {data}=await sb.from('shipments').select('*');
 const cols={
  new:data.filter(s=>!s.assigned_to),
  progress:data.filter(s=>s.assigned_to),
  done:data.filter(s=>s.status==='done')
 };
 content.innerHTML=`<h1>Kanban</h1><div class="kanban">
 ${Object.keys(cols).map(c=>`
 <div class="col" ondrop="drop(event,'${c}')" ondragover="allow(event)">
 <h3>${c}</h3>
 ${cols[c].map(s=>`
  <div draggable="true" ondragstart="drag(event,'${s.id}')" class="card-job ${s.vip?'vip':''}">
   ${s.shipment_ref}
  </div>`).join('')}
 </div>`).join('')}
 </div>`;
}

function drag(e,id){e.dataTransfer.setData('id',id)}
function allow(e){e.preventDefault()}
async function drop(e,col){
 e.preventDefault();
 const id=e.dataTransfer.getData('id');
 await sb.from('shipments').update({status:col}).eq('id',id);
 render();
}

function bd(){
 content.innerHTML=`
 <h1>BD Upload</h1>
 <textarea id="raw"></textarea>
 <button onclick="parse()">Parse</button>
 <div id="out"></div>`;
}

function parse(){
 const t=raw.value;
 const vip=/vip/i.test(t);
 out.innerText=JSON.stringify({vip},null,2);
}
</script>
</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateFlow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --nav:#04142e;--nav2:#0a1f43;--brand:#06b7a5;--brand2:#069788;--bg:#f4f7f8;
  --text:#11213d;--muted:#6f7d93;--line:#e4ebed;--danger:#ef5c5c;--warning:#f0a227;--success:#18a66e;
}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
.login{display:flex;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 25%,#0d2152,var(--nav) 60%);padding:20px}
.login-card{background:white;padding:34px;border-radius:24px;width:min(420px,100%);box-shadow:0 35px 90px rgba(0,0,0,.28)}
.login-card h2{margin:0 0 6px;color:var(--nav)}
.login-card p{margin:0 0 18px;color:var(--muted);font-size:13px}
input,select,textarea,button{font-family:inherit}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-top:8px;font-size:14px;background:white}
textarea{min-height:170px;resize:vertical}
button{border:0;border-radius:11px;padding:11px 14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--brand),var(--brand2));color:white}
button.gold{background:linear-gradient(135deg,#f7c948,#d99a00);color:#221500;box-shadow:0 10px 26px rgba(217,154,0,.28)}
button.secondary{background:white;color:var(--text);border:1px solid var(--line)}
button.danger{background:var(--danger)}
#msg{margin-top:12px;font-size:13px;color:var(--danger)}
.app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;width:230px;background:var(--nav);color:white;height:100vh;padding:18px 12px}
.logo{font-weight:900;font-size:20px;margin:6px 8px 20px;letter-spacing:.3px}.logo span{background:var(--brand);border-radius:10px;padding:7px 10px;margin-right:8px}
.nav{padding:12px 14px;cursor:pointer;border-radius:12px;margin:4px 0;font-weight:800;font-size:14px;color:rgba(255,255,255,.86)}
.nav:hover,.nav.active{background:var(--nav2);color:white}
.vip-upload{margin:14px 8px 18px;padding:13px 12px;border-radius:16px;background:linear-gradient(135deg,#f7c948,#d99a00);color:#221500;font-weight:900;text-align:center;cursor:pointer;box-shadow:0 14px 30px rgba(217,154,0,.25)}
.vip-upload small{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;color:#4b3000}
.content{margin-left:230px;padding:24px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.top h1{margin:0;color:var(--nav)}.sub{color:var(--muted);margin:4px 0 0;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}@media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}.sidebar{position:static;width:100%;height:auto}.content{margin-left:0}}
.card{background:white;border:1px solid rgba(0,0,0,.04);border-radius:20px;box-shadow:0 22px 60px rgba(6,20,46,.07);padding:18px;margin-bottom:16px}.card h3{margin:0 0 8px;color:var(--brand2);font-size:15px}.metric{font-size:30px;font-weight:900;color:var(--nav)}
table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#f8fbfc}.badge{display:inline-block;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:900}.vip{background:#ffe4e4;color:var(--danger)}.ok{background:#dff5eb;color:var(--success)}.warn{background:#fff1da;color:#d88d10}.muted{background:#f4f7f8;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}@media(max-width:760px){.form-grid{grid-template-columns:1fr}}
label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-top:8px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}@media(max-width:900px){.preview{grid-template-columns:1fr}}
.preview-item{background:#f8fbfc;border:1px solid var(--line);border-radius:14px;padding:11px}.preview-item small{display:block;text-transform:uppercase;font-weight:900;color:var(--muted);font-size:10px;margin-bottom:4px}.preview-item strong{font-size:14px;color:var(--nav);word-break:break-word}
.notice{padding:12px 14px;border-radius:14px;background:#fff1da;color:#a66a00;font-size:13px;margin:10px 0}.success-msg{padding:12px 14px;border-radius:14px;background:#dff5eb;color:var(--success);font-size:13px;margin:10px 0}
#map{height:430px;border-radius:18px;overflow:hidden}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:14px;overflow-x:auto;padding-bottom:10px}.kanban-col{background:#eef4f5;border:1px solid var(--line);border-radius:18px;padding:12px;min-height:520px}.kanban-col h3{margin:0 0 10px;color:var(--nav);font-size:14px;display:flex;justify-content:space-between}.kanban-card{background:white;border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:0 10px 22px rgba(6,20,46,.06)}.kanban-card strong{color:var(--nav)}.kanban-card .mini{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.35}.kanban-card.vip-card{border-left:5px solid #d99a00;background:#fff9e8}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="login-card">
    <h2>GateFlow</h2>
    <p>Password login only. No magic links.</p>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="msg"></div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="logo"><span>G</span>GateFlow</div>
    <div class="vip-upload" onclick="setView('bd');setTimeout(()=>document.getElementById('raw')?.focus(),100)"><small>VIP / BD</small>Upload Handover</div>
    <div class="nav active" data-view="dashboard" onclick="setView('dashboard')">Dashboard</div>
    <div class="nav" data-view="jobs" onclick="setView('jobs')">Assigned Jobs</div>
    <div class="nav" data-view="assign" onclick="setView('assign')">Jobs to Assign</div>
    <div class="nav" data-view="bd" onclick="setView('bd')">BD Handovers</div>
    <div class="nav" data-view="kanban" onclick="setView('kanban')">Kanban Board</div>
    <div class="nav" onclick="logout()">Sign out</div>
  </aside>
  <main class="content" id="content"></main>
</div>

<script>
// IMPORTANT: URL and anon key must come from the SAME Supabase project.
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_FULL_ANON_KEY_HERE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let authUser=null;
let appUser=null;
let view='dashboard';
let lastParsed=null;
let mapInstance=null;

async function login(){
  const email=document.getElementById('email').value.trim().toLowerCase();
  const password=document.getElementById('password').value;
  const msg=document.getElementById('msg');
  msg.textContent='Signing in...';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){msg.textContent=error.message;return;}
  authUser=data.user;
  await start();
}
async function logout(){await sb.auth.signOut();location.reload();}
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){authUser=session.user;await start();}
}
async function start(){
  const {data,error}=await sb.from('users').select('*').eq('email',authUser.email).maybeSingle();
  if(error||!data){document.getElementById('msg').textContent=authUser.email+' is not in the users table.';return;}
  appUser=data;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
function setView(v){view=v;document.querySelectorAll('.nav[data-view]').forEach(n=>n.classList.toggle('active',n.dataset.view===v));render();}

function fmtDate(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function todayIso(){return new Date().toISOString().slice(0,10);}

async function getShipments(){const {data,error}=await sb.from('shipments').select('*').order('created_at',{ascending:false});if(error){alert(error.message);return [];}return data||[];}
async function getHandovers(){const {data,error}=await sb.from('bd_handovers').select('*').order('created_at',{ascending:false});if(error){return [];}return data||[];}
async function getUsers(){const {data}=await sb.from('users').select('*').eq('active',true).order('full_name');return data||[];}

async function render(){
  if(view==='dashboard') await renderDashboard();
  if(view==='jobs') await renderJobs();
  if(view==='assign') await renderAssign();
  if(view==='bd') await renderBD();
  if(view==='kanban') await renderKanban();
}

async function renderDashboard(){
  const ships=await getShipments();
  const open=ships.filter(s=>!isDelivered(s));
  const unassigned=ships.filter(s=>!s.assigned_to);
  const mine=ships.filter(s=>s.assigned_to===appUser.id);
  const handovers=await getHandovers();
  const vip=handovers.filter(h=>h.vip).length;
  document.getElementById('content').innerHTML=`
    <div class="top"><div><h1>Operations Dashboard</h1><p class="sub">Map, calendar dates, my shipments, unassigned shipments, and BD handover intake.</p></div><button onclick="setView('bd')">+ Parse Handover</button></div>
    <div class="grid">
      <div class="card"><h3>Open Shipments</h3><div class="metric">${open.length}</div></div>
      <div class="card"><h3>My Shipments</h3><div class="metric">${mine.length}</div></div>
      <div class="card"><h3>Unassigned Shipments</h3><div class="metric">${unassigned.length}</div></div>
      <div class="card"><h3>VIP Handovers</h3><div class="metric">${vip}</div></div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr;">
      <div class="card">
        <h3>My Shipments</h3>
        <p class="sub">Only jobs assigned to you appear here.</p>
        <div style="overflow:auto"><table><thead><tr><th>Ref</th><th>Client</th><th>Route</th><th>ETA</th></tr></thead><tbody>
          ${mine.slice(0,8).map(s=>`<tr><td><strong>${s.shipment_ref||'—'}</strong></td><td>${s.client||'—'}</td><td>${s.origin||'—'} → ${s.destination||'—'}</td><td>${fmtDate(s.eta)}</td></tr>`).join('')||'<tr><td colspan="4">No shipments assigned to you.</td></tr>'}
        </tbody></table></div>
      </div>
      <div class="card">
        <h3>Unassigned Shipments</h3>
        <p class="sub">New BD uploads land here first. Assign them manually from Jobs to Assign.</p>
        <div style="overflow:auto"><table><thead><tr><th>Ref</th><th>Client</th><th>Route</th><th>ETA</th></tr></thead><tbody>
          ${unassigned.slice(0,8).map(s=>`<tr><td><strong>${s.shipment_ref||'—'}</strong></td><td>${s.client||'—'}</td><td>${s.origin||'—'} → ${s.destination||'—'}</td><td>${fmtDate(s.eta)}</td></tr>`).join('')||'<tr><td colspan="4">No unassigned shipments.</td></tr>'}
        </tbody></table></div>
        <div class="actions"><button class="secondary" onclick="setView('assign')">Open Jobs to Assign</button></div>
      </div>
    </div>

    <div class="card"><h3>Shipment Map</h3><div id="map"></div><p class="sub">Markers use rough demo positioning unless locations are cached/geocoded later.</p></div>
    <div class="card"><h3>Calendar: Pickup / ETD / ETA</h3><div style="overflow:auto"><table><thead><tr><th>Date</th><th>Type</th><th>Ref</th><th>Client</th><th>Route</th></tr></thead><tbody>${calendarRows(ships)}</tbody></table></div></div>
  `;
  drawMap(ships);
}
function isDelivered(s){return (s.milestones||[]).some(m=>['DELIVERED','POD','RELEASED'].includes(m.code));}
function calendarRows(ships){
  const rows=[];
  ships.forEach(s=>{
    if(s.pickup_date) rows.push({date:s.pickup_date,type:'Pickup',s});
    if(s.etd) rows.push({date:s.etd,type:'ETD / Departure',s});
    if(s.eta) rows.push({date:s.eta,type:'ETA / Arrival',s});
  });
  rows.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  return rows.slice(0,50).map(r=>`<tr><td><strong>${fmtDate(r.date)}</strong></td><td>${r.type}</td><td>${r.s.shipment_ref||'—'}</td><td>${r.s.client||'—'}</td><td>${r.s.origin||'—'} → ${r.s.destination||'—'}</td></tr>`).join('')||'<tr><td colspan="5">No calendar dates yet.</td></tr>';
}
function drawMap(ships){
  if(mapInstance){mapInstance.remove();mapInstance=null;}
  mapInstance=L.map('map').setView([53.35,-6.26],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInstance);
  const demo=[[53.35,-6.26],[51.5,-0.12],[52.52,13.4],[48.85,2.35],[40.71,-74.0],[25.2,55.27],[31.23,121.47]];
  ships.slice(0,40).forEach((s,i)=>{
    const p=demo[i%demo.length];
    L.circleMarker(p,{radius:8,fillColor:s.assigned_to?'#06b7a5':'#f0a227',color:'#fff',weight:2,fillOpacity:.9}).addTo(mapInstance).bindPopup(`<strong>${s.shipment_ref||'Shipment'}</strong><br>${s.client||''}<br>${s.origin||''} → ${s.destination||''}`);
  });
}

async function renderJobs(){
  const ships=(await getShipments()).filter(s=>s.assigned_to===appUser.id);
  document.getElementById('content').innerHTML=`<div class="top"><div><h1>Assigned Jobs</h1><p class="sub">Your active shipment queue.</p></div></div><div class="card"><table><thead><tr><th>Ref</th><th>Client</th><th>Type</th><th>Route</th><th>ETA</th></tr></thead><tbody>${ships.map(s=>`<tr><td><strong>${s.shipment_ref||'—'}</strong></td><td>${s.client||'—'}</td><td>${s.shipment_type||'—'}</td><td>${s.origin||'—'} → ${s.destination||'—'}</td><td>${fmtDate(s.eta)}</td></tr>`).join('')||'<tr><td colspan="5">No assigned jobs.</td></tr>'}</tbody></table></div>`;
}
async function renderAssign(){
  const ships=(await getShipments()).filter(s=>!s.assigned_to);
  const users=(await getUsers()).filter(u=>u.role==='ops'||u.role==='manager'||u.role==='admin');
  document.getElementById('content').innerHTML=`<div class="top"><div><h1>Jobs to Assign</h1><p class="sub">New shipments waiting for an owner.</p></div></div><div class="card"><table><thead><tr><th>Ref</th><th>Client</th><th>Route</th><th>Assign</th></tr></thead><tbody>${ships.map(s=>`<tr><td><strong>${s.shipment_ref||'—'}</strong></td><td>${s.client||'—'}</td><td>${s.origin||'—'} → ${s.destination||'—'}</td><td><select onchange="assignJob('${s.id}',this.value)"><option value="">Choose...</option>${users.map(u=>`<option value="${u.id}">${u.full_name||u.email}</option>`).join('')}</select></td></tr>`).join('')||'<tr><td colspan="4">No unassigned jobs.</td></tr>'}</tbody></table></div>`;
}
async function assignJob(id,userId){if(!userId)return;const {error}=await sb.from('shipments').update({assigned_to:userId}).eq('id',id);if(error)alert(error.message);else renderAssign();}

async function renderKanban(){
  const ships=await getShipments();
  const cols=[
    {key:'new',title:'New / To Assign',filter:s=>!s.assigned_to},
    {key:'booked',title:'Booked',filter:s=>stageOf(s)==='BOOKED'&&s.assigned_to},
    {key:'transit',title:'In Transit',filter:s=>['PICKED_UP','DEPARTED','SAILED','IN_TRANSIT','LOADED'].includes(stageOf(s))},
    {key:'customs',title:'Customs / Clearance',filter:s=>['CUSTOMS','SUBMITTED','CLEARED','DISCHARGED','ARRIVED'].includes(stageOf(s))},
    {key:'done',title:'Delivered / Closed',filter:s=>isDelivered(s)}
  ];
  document.getElementById('content').innerHTML=`
    <div class="top"><div><h1>Kanban Board</h1><p class="sub">Shipment workflow at a glance. VIP handovers are highlighted in gold.</p></div><button class="gold" onclick="setView('bd')">+ VIP BD Upload</button></div>
    <div class="kanban">
      ${cols.map(col=>{
        const items=ships.filter(col.filter);
        return `<div class="kanban-col"><h3>${col.title}<span class="badge muted">${items.length}</span></h3>${items.map(kanbanCard).join('')||'<div class="sub">No jobs here.</div>'}</div>`;
      }).join('')}
    </div>`;
}
function stageOf(s){
  const ms=s.milestones||[];
  if(!ms.length)return 'NEW';
  return [...ms].sort((a,b)=>new Date(b.completed_at)-new Date(a.completed_at))[0].code||'NEW';
}
function kanbanCard(s){
  const vip=s.vip||String(s.bd_notes||s.notes||'').toLowerCase().includes('vip');
  return `<div class="kanban-card ${vip?'vip-card':''}">
    <div>${vip?'<span class="badge vip">VIP</span> ':''}<strong>${s.shipment_ref||'No Ref'}</strong></div>
    <div class="mini"><b>${s.client||'Unknown Client'}</b></div>
    <div class="mini">${s.shipment_type||'—'} • ${s.origin||'—'} → ${s.destination||'—'}</div>
    <div class="mini">ETA: ${fmtDate(s.eta)} • Stage: ${stageOf(s).replaceAll('_',' ')}</div>
  </div>`;
}

async function renderBD(){
  const handovers=await getHandovers();
  document.getElementById('content').innerHTML=`
    <div class="top"><div><h1>BD Handovers</h1><p class="sub">Paste messy handover text, preview extracted fields, then create a shipment.</p></div></div>
    <div class="card">
      <h3>Paste handover text</h3>
      <textarea id="raw" placeholder="Paste handover/email text here. Example: VIP client: Acme Ltd, Air Import, Dublin to New York, pickup 12/05/2026, ETD 13/05/2026, ETA 14/05/2026, AWB 123-45678901..."></textarea>
      <div class="actions"><button onclick="doParse()">Preview parse</button><button class="secondary" onclick="clearParse()">Clear</button></div>
      <div id="parseMsg"></div>
      <div id="preview"></div>
    </div>
    <div class="card"><h3>Recent Handovers</h3><table><thead><tr><th>VIP</th><th>Ref</th><th>Client</th><th>Type</th><th>Route</th><th>ETA</th></tr></thead><tbody>${handovers.map(h=>`<tr><td>${h.vip?'<span class="badge vip">VIP</span>':'<span class="badge muted">Normal</span>'}</td><td>${h.shipment_ref||'—'}</td><td>${h.client||'—'}</td><td>${h.shipment_type||'—'}</td><td>${h.origin||'—'} → ${h.destination||'—'}</td><td>${fmtDate(h.eta)}</td></tr>`).join('')||'<tr><td colspan="6">No handovers yet.</td></tr>'}</tbody></table></div>
  `;
}
function clearParse(){lastParsed=null;document.getElementById('raw').value='';document.getElementById('preview').innerHTML='';document.getElementById('parseMsg').innerHTML='';}
function doParse(){
  const text=document.getElementById('raw').value.trim();
  if(!text){document.getElementById('parseMsg').innerHTML='<div class="notice">Paste handover text first.</div>';return;}
  lastParsed=parseHandover(text);
  renderPreview(lastParsed);
}
function renderPreview(p){
  const conf=p.confidence||{};
  const item=(label,val,key)=>`<div class="preview-item"><small>${label}${conf[key]?` • ${conf[key]}%`:''}</small><strong>${val||'—'}</strong></div>`;
  document.getElementById('preview').innerHTML=`
    <div class="preview">
      ${item('Client',p.client,'client')}${item('Contact Email',p.contact_email,'contact_email')}${item('Reference',p.shipment_ref,'shipment_ref')}
      ${item('Shipment Type',p.shipment_type,'shipment_type')}${item('Origin',p.origin,'origin')}${item('Destination',p.destination,'destination')}
      ${item('Pickup Date',fmtDate(p.pickup_date),'pickup_date')}${item('ETD / Departure',fmtDate(p.etd),'etd')}${item('ETA / Arrival',fmtDate(p.eta),'eta')}
      ${item('Priority',p.vip?'VIP / Urgent':'Normal','vip')}${item('Direction',p.direction,'direction')}${item('Mode',p.mode,'mode')}
    </div>
    <label>Notes</label><textarea id="parsedNotes">${escapeHtml(p.notes||'')}</textarea>
    <div class="actions"><button onclick="createFromParse()">Create Shipment + Handover</button><button class="secondary" onclick="copyParsedJson()">Copy JSON</button></div>
  `;
}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function copyParsedJson(){navigator.clipboard.writeText(JSON.stringify(lastParsed,null,2));document.getElementById('parseMsg').innerHTML='<div class="success-msg">Copied parsed JSON.</div>';}

function parseHandover(raw){
  const text=raw.replace(/\r/g,'').replace(/[\t]+/g,' ').replace(/\u00a0/g,' ');
  const compact=text.replace(/[ ]{2,}/g,' ');
  const lower=compact.toLowerCase();
  const out={raw_text:raw,client:null,contact_email:null,shipment_ref:null,origin:null,destination:null,shipment_type:null,mode:null,direction:null,etd:null,eta:null,pickup_date:null,vip:false,notes:null,confidence:{}};
  const set=(k,v,c)=>{if(v&&!out[k]){out[k]=clean(v);out.confidence[k]=c||80;}};
  const setDate=(k,v,c)=>{const d=parseDate(v);if(d&&!out[k]){out[k]=d;out.confidence[k]=c||80;}};

  // VIP / priority
  if(/\b(vip|urgent|priority|high\s*value|key\s*account|critical|must\s+go|hot\s+shipment|time\s+critical)\b/i.test(text)){out.vip=true;out.confidence.vip=95;}

  // emails
  set('contact_email',(text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i)||[])[0],95);

  // references
  const refPatterns=[
    /\b(?:shipment|job|ref(?:erence)?|booking|file)\s*(?:no\.?|number|#|:)?\s*([A-Z]{2,5}[-/ ]?\d{3,}[A-Z0-9-]*)/i,
    /\b(?:awb|mawb|hawb)\s*(?:no\.?|#|:)?\s*([0-9]{3}[- ]?[0-9]{7,8}|[A-Z0-9-]{6,})/i,
    /\b(?:bl|b\/l|mbl|hbl)\s*(?:no\.?|#|:)?\s*([A-Z0-9-]{5,})/i,
    /\b(?:container|cntr)\s*(?:no\.?|#|:)?\s*([A-Z]{4}\d{7})/i,
    /\b(SHP[- ]?\d{3,}|JOB[- ]?\d{3,}|MW[- ]?\d{3,})\b/i
  ];
  for(const r of refPatterns){const m=text.match(r);if(m){set('shipment_ref',m[1],90);break;}}

  // client/customer
  const clientPatterns=[
    /\b(?:client|customer|company|account|consignee|shipper)\s*[:\-]\s*([^\n,;]+)/i,
    /\b(?:for)\s+([A-Z][A-Za-z0-9&.,'’\- ]{2,40})\s+(?:please|needs|requires|has|is|from|to)/i
  ];
  for(const r of clientPatterns){const m=text.match(r);if(m){set('client',m[1],85);break;}}

  // mode/direction/type
  const mode=/\bair\b|\bflight\b|\bawb\b|\bmawb\b/i.test(text)?'Air':/\bocean\b|\bsea\b|\bvessel\b|\bcontainer\b|\bbl\b|\bsailing\b/i.test(text)?'Ocean':/\broad\b|\btruck\b|\btrailer\b|\bcollection\b|\bpickup\b/i.test(text)?'Road':/\bcustoms\b|\bclearance\b|\bentry\b/i.test(text)?'Customs':null;
  if(mode){out.mode=mode;out.confidence.mode=80;}
  const direction=/\bimport\b|\bimp\b/i.test(text)?'Import':/\bexport\b|\bexp\b/i.test(text)?'Export':null;
  if(direction){out.direction=direction;out.confidence.direction=85;}
  if(mode==='Customs') out.shipment_type='Customs';
  else if(mode&&direction) out.shipment_type=mode+' '+direction;
  else if(mode) out.shipment_type=mode+' Import';
  if(out.shipment_type) out.confidence.shipment_type=80;

  // route extraction
  const routePatterns=[
    /\bfrom\s+([^\n,;]+?)\s+(?:to|into|->|→)\s+([^\n,;]+)/i,
    /\b(?:origin|pol|pickup\s+location)\s*[:\-]\s*([^\n,;]+).*?\b(?:destination|pod|delivery\s+location)\s*[:\-]\s*([^\n,;]+)/is,
    /\b([^\n,;]{2,40})\s*(?:->|→)\s*([^\n,;]{2,40})/i,
    /\broute\s*[:\-]\s*([^\n,;]+?)\s*(?:to|->|→|/)\s*([^\n,;]+)/i
  ];
  for(const r of routePatterns){const m=text.match(r);if(m){set('origin',m[1],82);set('destination',m[2],82);break;}}
  const explicitOrigin=text.match(/\b(?:origin|pol|from)\s*[:\-]\s*([^\n,;]+)/i); if(explicitOrigin) set('origin',explicitOrigin[1],88);
  const explicitDest=text.match(/\b(?:destination|pod|to|delivery\s+location)\s*[:\-]\s*([^\n,;]+)/i); if(explicitDest) set('destination',explicitDest[1],88);

  // dates
  const dateChunk='([0-3]?\d[\/\-.][01]?\d[\/\-.](?:20)?\d{2}|(?:\d{4})[\/\-.][01]?\d[\/\-.][0-3]?\d|[0-3]?\d\s+[A-Za-z]{3,9}\s+(?:20)?\d{2}|[A-Za-z]{3,9}\s+[0-3]?\d,?\s+(?:20)?\d{2})';
  setDate('pickup_date',(text.match(new RegExp('(?:pickup|pick up|collection|collect|cargo ready|ready date)\\s*(?:date|on|:|-)?.{0,20}'+dateChunk,'i'))||[])[1],90);
  setDate('etd',(text.match(new RegExp('(?:etd|departure|departing|flight|sailing|vessel sails|cut[- ]?off)\\s*(?:date|on|:|-)?.{0,20}'+dateChunk,'i'))||[])[1],90);
  setDate('eta',(text.match(new RegExp('(?:eta|arrival|arriving|delivery date|due date)\\s*(?:date|on|:|-)?.{0,20}'+dateChunk,'i'))||[])[1],90);

  // If line-based labelled values exist, use them too.
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  for(const line of lines){
    const kv=line.match(/^([A-Za-z /_-]{2,30})\s*[:\-]\s*(.+)$/);
    if(!kv) continue;
    const key=kv[1].toLowerCase(), val=kv[2];
    if(/client|customer|company|account/.test(key)) set('client',val,92);
    if(/origin|from|pol/.test(key)) set('origin',val,92);
    if(/destination|to|pod/.test(key)) set('destination',val,92);
    if(/ref|job|shipment|booking|awb|hawb|mawb|bl/.test(key)) set('shipment_ref',val,92);
    if(/pickup|collection|cargo ready/.test(key)) setDate('pickup_date',val,92);
    if(/etd|departure|sailing|flight/.test(key)) setDate('etd',val,92);
    if(/eta|arrival|delivery/.test(key)) setDate('eta',val,92);
  }

  // notes: preserve useful remaining detail
  out.notes=compact.slice(0,1500);
  return out;
}
function clean(v){
  return String(v||'').replace(/^[\s:#-]+|[\s,;]+$/g,'').replace(/\s+/g,' ').trim().slice(0,160);
}
function parseDate(v){
  if(!v) return null;
  let s=String(v).trim().replace(/,/g,'').replace(/\./g,'/').replace(/-/g,'/');
  const months={jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,jul:7,july:7,aug:8,august:8,sep:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
  let m=s.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=2000;return iso(y,months[m[2].toLowerCase()],+m[1]);}
  m=s.match(/^([A-Za-z]+)\s+(\d{1,2})\s+(\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=2000;return iso(y,months[m[1].toLowerCase()],+m[2]);}
  m=s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if(m)return iso(+m[1],+m[2],+m[3]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){let y=+m[3];if(y<100)y+=2000;return iso(y,+m[2],+m[1]);}
  return null;
}
function iso(y,m,d){if(!y||!m||!d||m<1||m>12||d<1||d>31)return null;return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

async function createFromParse(){
  if(!lastParsed){alert('Parse text first.');return;}
  const notes=document.getElementById('parsedNotes')?.value||lastParsed.notes||'';
  const handover={
    raw_text:lastParsed.raw_text,client:lastParsed.client,contact_email:lastParsed.contact_email,shipment_ref:lastParsed.shipment_ref,
    origin:lastParsed.origin,destination:lastParsed.destination,shipment_type:lastParsed.shipment_type,etd:lastParsed.etd,eta:lastParsed.eta,
    pickup_date:lastParsed.pickup_date,vip:lastParsed.vip,notes,created_by:appUser.id
  };
  const {error:hErr}=await sb.from('bd_handovers').insert(handover);
  if(hErr){alert('Handover save failed: '+hErr.message);return;}

  const shipment={
    shipment_ref:lastParsed.shipment_ref||('BD-'+Date.now()),client:lastParsed.client||'Unknown Client',origin:lastParsed.origin,destination:lastParsed.destination,
    shipment_type:lastParsed.shipment_type||'Air Import',eta:lastParsed.eta,assigned_to:null,
    milestones:[{code:'BOOKED',label:'Booked from BD handover',completed_at:new Date().toISOString(),completed_by:appUser.email,note:lastParsed.vip?'VIP handover':''}],
    milestone_updated_at:new Date().toISOString()
  };
  // Add optional date columns only if your shipments table has them. If not, fallback automatically.
  let insertPayload={...shipment,pickup_date:lastParsed.pickup_date,etd:lastParsed.etd,vip:lastParsed.vip,bd_notes:notes};
  let {error:sErr}=await sb.from('shipments').insert(insertPayload);
  if(sErr && /column .* does not exist/i.test(sErr.message)){
    const {error:fallbackErr}=await sb.from('shipments').insert(shipment);
    sErr=fallbackErr;
  }
  if(sErr){alert('Handover saved, but shipment create failed: '+sErr.message);return;}
  document.getElementById('parseMsg').innerHTML='<div class="success-msg">Created handover and shipment. It is now in Jobs to Assign.</div>';
  setTimeout(()=>setView('assign'),900);
}

boot();
</script>
