<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GateFlow</title>
  <style>
    body { font-family: Arial; background:#f3f4f6; padding:40px; }
    .box { max-width:400px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    input,button { width:100%; padding:10px; margin-top:10px; }
    button { background:#2563eb; color:#fff; border:none; }
  </style>
</head>
<body>

<div class="box" id="login">
  <h2>GateFlow Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<div class="box" id="app" style="display:none;">
  <h2>GateFlow</h2>
  <p id="user"></p>
  <p id="role"></p>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://edxgkwkdgvsajfmkejbk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek'
)

window.login = async function () {
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value

  const { error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) {
    document.getElementById('msg').innerText = error.message
    return
  }

  loadUser()
}

window.logout = async function () {
  await supabase.auth.signOut()
  location.reload()
}

async function loadUser() {
  const { data } = await supabase.auth.getUser()
  const user = data.user

  const { data: profile } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single()

  document.getElementById('login').style.display = 'none'
  document.getElementById('app').style.display = 'block'

  document.getElementById('user').innerText = profile.full_name
  document.getElementById('role').innerText = "Role: " + profile.role
}

loadUser()
</script>

</body>
</html>
