function setTypeFilter(type) {
  typeFilter = type;

  renderAll();

function extractFirst(text, patterns) {
  for (const p of patterns) {
    const match = text.match(p);
    if (match && match[1]) return match[1].trim().replace(/\s+/g, " ");
  }
  return "";
}

function normaliseDate(value) {
  if (!value) return "";

  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

  const parts = value.split(/[\/.-]/);
  if (parts.length !== 3) return "";

  let [d, m, y] = parts;
  if (y.length === 2) y = "20" + y;

  return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
}

async function readDocText(file) {
  if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    return text;
  }

  return await file.text();
}

function parseShipmentText(text) {
  const clean = text.replace(/\r/g, "\n");

  setVal("awb", extractFirst(clean, [
    /(?:AWB|Waybill|Waybill No|Waybill Number|Tracking No|Tracking Number)[:\s#-]+([A-Z0-9\-]+)/i
  ]));

  setVal("carrier", extractFirst(clean, [
    /(?:Carrier|Courier|Airline|Forwarder)[:\s]+([^\n]+)/i
  ]));

  setVal("pieces", extractFirst(clean, [
    /(?:Pieces|PCS|Packages|No\. of Pieces|Number of Pieces)[:\s]+([0-9]+)/i
  ]));

  setVal("weight", extractFirst(clean, [
    /(?:Weight|Gross Weight|Chargeable Weight)[:\s]+([0-9.,]+\s?(?:KG|KGS|LB|LBS)?)/i
  ]));

  setVal("shipper", extractFirst(clean, [
    /(?:Shipper|Sender|Exporter)[:\s]+([^\n]+)/i
  ]));

  setVal("consignee", extractFirst(clean, [
    /(?:Consignee|Receiver|Importer)[:\s]+([^\n]+)/i
  ]));

  setVal("client", getVal("consignee") || getVal("shipper"));

  setVal("origin", extractFirst(clean, [
    /(?:Origin|From|POL|Port of Loading)[:\s]+([^\n]+)/i
  ]));

  setVal("destination", extractFirst(clean, [
    /(?:Destination|To|POD|Port of Discharge)[:\s]+([^\n]+)/i
  ]));

  const etaRaw = extractFirst(clean, [
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{4}-[0-9]{2}-[0-9]{2})/i,
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{1,2}[\/.-][0-9]{1,2}[\/.-][0-9]{2,4})/i
  ]);

  setVal("eta", normaliseDate(etaRaw));
}

function initDocUpload() {
  const input = document.getElementById("docUpload");
  const list = document.getElementById("docList");
  if (!input || !list) return;

  input.addEventListener("change", async e => {
    selectedDocs = Array.from(e.target.files || []);

    list.innerHTML = selectedDocs.length
      ? selectedDocs.map(f => "📄 " + f.name).join("<br>")
      : "No documents";

    for (const file of selectedDocs) {
      try {
        const text = await readDocText(file);
        parseShipmentText(text);
      } catch (err) {
        console.warn("Could not parse:", file.name, err);
      }
    }
  });
}

async function uploadSelectedDocs() {
  const urls = [];

  for (const file of selectedDocs) {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    const path = `${Date.now()}_${safeName}`;

    const { error } = await sb.storage.from(BUCKET).upload(path, file);

    if (error) {
      alert("Document upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

function initMap() {
  if (map) {
    map.invalidateSize();
    return;
  }

  map = L.map("map").setView([53.3498, -6.2603], 4);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  mapLayer = L.layerGroup().addTo(map);
  setTimeout(() => map.invalidateSize(), 300);
}

async function geocode(place) {
  if (!place) return [53.3498, -6.2603];

  const key = place.toLowerCase();
  if (geoCache[key]) return geoCache[key];

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(place)}`
    );
    const data = await res.json();

    if (data[0]) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[key] = coords;
      return coords;
    }
  } catch {}

  return [53.3498, -6.2603];
}

async function renderMap(data) {
  if (!mapLayer) return;

  mapLayer.clearLayers();
  const bounds = [];

  for (const x of data.slice(0, 10)) {
    const o = await geocode(x.origin);
    const d = await geocode(x.destination);

    bounds.push(o, d);

    L.marker(o).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.origin || ""}`);
    L.marker(d).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.destination || ""}`);

    L.polyline([o, d], {
      color: x.status === "Delayed" ? "red" : "#06b7a5",
      weight: 4,
      opacity: .85,
      dashArray: x.status === "In Transit" ? "8,8" : null
    }).addTo(mapLayer);
  }

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 6 });
  }
}

function filteredShipments() {

function renderTimeline(data) {
  const box = document.getElementById("timeline");
  const today = new Date();
  today.setHours(0,0,0,0);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    return d;
  });

  box.innerHTML = days.map(day => {
    const key = day.getFullYear() + "-" +
      String(day.getMonth() + 1).padStart(2, "0") + "-" +
      String(day.getDate()).padStart(2, "0");

    const events = data.filter(x =>
      localDateOnly(x.eta) === key ||
      localDateOnly(x.pickup_date) === key ||
      localDateOnly(x.etd) === key
    );

    return `
      <div>
        <strong>${day.toLocaleDateString("en-GB", { weekday:"short", day:"2-digit", month:"short" })}</strong>
        <br>
        ${events.length ? events.map(x => `
          <span>${x.client || "No customer"}<br>${x.shipment_ref || ""}</span><hr>
        `).join("") : "<span>No events</span>"}
      </div>
    `;
  }).join("");
}

function renderUnassigned() {
  const box = document.getElementById("unassigned");
  const list = shipments.filter(x => !x.assigned_to);

  box.innerHTML = list.length ? list.slice(0, 8).map(x => `
    <div style="padding:12px;border-bottom:1px solid #e4ebed;">
      <strong>${x.client || "No customer"}</strong><br>
      ${x.shipment_type || "Shipment"} · ${x.origin || ""} → ${x.destination || ""}
      <br><button class="primary-btn" style="height:34px;margin-top:8px;" onclick="takeShipment('${x.id}')">Take</button>
    </div>
  `).join("") : `<div style="padding:16px;color:#6f7d93;">No unassigned shipments</div>`;
}

async function takeShipment(id) {
  const { error } = await sb.from("shipments").update({ assigned_to: user.email }).eq("id", id);
  if (error) {
    alert("Could not take shipment: " + error.message);
    return;
  }
  await loadShipments();
}

function statusClass(status) {
  if (status === "In Transit") return "transit";
  if (status === "Delayed") return "delayed";
  return "pending";
}

function renderAll() {
  const data = filteredShipments();

  document.getElementById("totalStat").textContent = data.length;
  document.getElementById("transitStat").textContent = data.filter(x => x.status === "In Transit").length;
  document.getElementById("delayedStat").textContent = data.filter(x => x.status === "Delayed").length;

  document.getElementById("rows").innerHTML = data.map(x => {
    const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

    return `
      <tr>
        <td>${x.shipment_ref || ""}</td>
        <td>${x.client || ""}<br><small>${x.awb_number || ""}</small></td>
        <td>${x.origin || ""} → ${x.destination || ""}<br><small>${x.shipment_type || ""}</small></td>
        <td><span class="pill ${statusClass(x.status)}">${x.status || "Pending"}</span></td>
        <td>${localDateOnly(x.eta) || "-"}</td>
        <td>${docs.length ? docs.map((u, i) => `<a href="${u}" target="_blank">Doc ${i + 1}</a>`).join("<br>") : "-"}</td>
      </tr>
    `;
  }).join("");

  renderTimeline(data);
  renderUnassigned();
  renderMap(data);
}

async function loadShipments() {
  const { data, error } = await sb.from("shipments").select("*").order("created_at", { ascending: false });

  if (error) {
    alert("Load error: " + error.message);
    return;
  }

  shipments = data || [];
  renderAll();
}

async function login() {
  const { data, error } = await sb.auth.signInWithPassword({
    email: getVal("loginEmail"),
    password: getVal("loginPassword")
  });

  if (error) {
    document.getElementById("loginError").textContent = error.message;
    return;
  }

  user = data.user;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "grid";
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("avatar").textContent = initials(user.email);

  initMap();
  await loadShipments();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

document.getElementById("loginBtn").onclick = login;
document.getElementById("logoutBtn").onclick = logout;

document.getElementById("openBtn").onclick = () => {
  document.getElementById("modal").classList.add("show");
};

document.getElementById("myBtn").onclick = () => {
  showMine = !showMine;
  document.getElementById("myBtn").classList.toggle("active", showMine);
  renderAll();
};

document.getElementById("saveBtn").onclick = async () => {
  const documentUrls = await uploadSelectedDocs();

  const payload = {
    shipment_ref: "SHP" + Date.now(),
    client: getVal("client"),
    origin: getVal("origin"),
    destination: getVal("destination"),
    awb_number: getVal("awb"),
    carrier: getVal("carrier"),
    pieces: getVal("pieces"),
    weight: getVal("weight"),
    shipper: getVal("shipper"),
    consignee: getVal("consignee"),
    eta: getVal("eta") || null,
    shipment_type: "Customs Clearance",
    status: "Pending",
    assigned_to: null,
    document_urls: documentUrls,
    created_by_email: user?.email || null,
    source: "manual"
  };

  if (!payload.client || !payload.origin || !payload.destination) {
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  const { error } = await sb.from("shipments").insert([payload]);

  if (error) {
    alert("Save error: " + error.message);
    return;
  }

  selectedDocs = [];
  ["docUpload","client","origin","destination","awb","carrier","pieces","weight","shipper","consignee","eta"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });

  document.getElementById("docList").innerHTML = "No documents";
  document.getElementById("modal").classList.remove("show");

  await loadShipments();
};

renderLoginUsers();
renderTypeFilters();
initDocUpload();
</script>
</body>
</html>
