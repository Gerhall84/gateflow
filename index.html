<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f7fb; }
    h1 { margin-top: 0; }
    .version { padding: 8px 12px; background: #fff3cd; border-radius: 8px; margin-bottom: 12px; }
    button { padding: 10px 14px; border: none; border-radius: 8px; background: #00a99d; color: white; cursor: pointer; }
    .secondary { background: #888; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-box { background: white; width: 360px; padding: 20px; border-radius: 12px; }
    .modal-box input, .modal-box select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .actions { display: flex; gap: 10px; justify-content: flex-end; }
    #statusMsg { margin-top: 12px; color: #333; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>GateKeeper</h1>
  <div class="version">VERSION: BUTTON-FIX-01</div>

  <button type="button" id="openBtn">+ Add Shipment</button>
  <div id="statusMsg">Page loaded.</div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Route</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h3>Add Shipment</h3>
      <input id="client" type="text" placeholder="Client" />
      <input id="origin" type="text" placeholder="Origin" />
      <input id="destination" type="text" placeholder="Destination" />
      <select id="status">
        <option value="Pending">Pending</option>
        <option value="In Transit">In Transit</option>
        <option value="Delivered">Delivered</option>
        <option value="Delayed">Delayed</option>
      </select>
      <div class="actions">
        <button type="button" class="secondary" id="cancelBtn">Cancel</button>
        <button type="button" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    const statusMsg = document.getElementById("statusMsg");
    const rows = document.getElementById("rows");
    const modal = document.getElementById("modal");
    const openBtn = document.getElementById("openBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const saveBtn = document.getElementById("saveBtn");

    function setStatus(msg) {
      statusMsg.textContent = msg;
      console.log(msg);
    }

    setStatus("Script loaded. Wiring button...");

    const supabase = window.supabase.createClient(
      "https://edxgkwkdgvsajfmkejbk.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJ9.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
    );

    openBtn.addEventListener("click", function () {
      modal.classList.add("show");
      setStatus("Add Shipment clicked. Modal opened.");
    });

    cancelBtn.addEventListener("click", function () {
      modal.classList.remove("show");
      setStatus("Modal closed.");
    });

    modal.addEventListener("click", function (e) {
      if (e.target === modal) {
        modal.classList.remove("show");
        setStatus("Modal closed.");
      }
    });

    async function loadShipments() {
      setStatus("Loading shipments...");
      const { data, error } = await supabase
        .from("shipments")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        setStatus("LOAD ERROR: " + error.message);
        return;
      }

      rows.innerHTML = (data || []).map(x => `
        <tr>
          <td>${x.shipment_ref || ""}</td>
          <td>${x.client || ""}</td>
          <td>${x.origin || ""} → ${x.destination || ""}</td>
          <td>${x.status || ""}</td>
        </tr>
      `).join("");

      setStatus("Loaded " + (data || []).length + " shipment(s).");
    }

    saveBtn.addEventListener("click", async function () {
      const client = document.getElementById("client").value.trim();
      const origin = document.getElementById("origin").value.trim();
      const destination = document.getElementById("destination").value.trim();
      const status = document.getElementById("status").value;

      if (!client || !origin || !destination) {
        setStatus("Please fill in Client, Origin and Destination.");
        return;
      }

      const payload = {
        shipment_ref: "SHP" + Date.now(),
        client,
        origin,
        destination,
        shipment_type: "Road",
        status,
        priority: "Medium"
      };

      setStatus("Saving shipment...");

      const { error } = await supabase.from("shipments").insert([payload]);

      if (error) {
        setStatus("SAVE ERROR: " + error.message);
        return;
      }

      document.getElementById("client").value = "";
      document.getElementById("origin").value = "";
      document.getElementById("destination").value = "";
      document.getElementById("status").value = "Pending";

      modal.classList.remove("show");
      setStatus("Save OK. Reloading...");
      await loadShipments();
    });

    loadShipments();
  </script>
</body>
</html>
