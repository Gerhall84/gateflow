function updateDocList() {

function extractFirst(text, patterns) {
  for (const p of patterns) {
    const match = text.match(p);
    if (match && match[1]) return match[1].trim().replace(/\s+/g, " ");
  }
  return "";
}

function fillIfEmpty(id, value) {
  if (!value) return;
  const el = document.getElementById(id);
  if (el && !el.value) el.value = value;
}

function normaliseDate(value) {
  if (!value) return "";

  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

  const parts = value.split(/[\/.-]/);
  if (parts.length !== 3) return "";

  let [d, m, y] = parts;
  if (y.length === 2) y = "20" + y;

  return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
}

async function readDocText(file) {
  if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ") + "\n";
    }

    return text;
  }

  return await file.text();
}

function parseShipmentText(text) {
  const clean = text.replace(/\r/g, "\n");

  const awb = extractFirst(clean, [
    /(?:AWB|Waybill|Waybill No|Waybill Number|Tracking No|Tracking Number)[:\s#-]+([A-Z0-9\-]+)/i
  ]);

  const carrier = extractFirst(clean, [
    /(?:Carrier|Courier|Airline|Forwarder)[:\s]+([^\n]+)/i
  ]);

  const etaRaw = extractFirst(clean, [
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{4}-[0-9]{2}-[0-9]{2})/i,
    /(?:ETA|Arrival Date|Date of Arrival)[:\s]+([0-9]{1,2}[\/.-][0-9]{1,2}[\/.-][0-9]{2,4})/i
  ]);

  const pieces = extractFirst(clean, [
    /(?:Pieces|PCS|Packages|No\. of Pieces|Number of Pieces)[:\s]+([0-9]+)/i
  ]);

  const weight = extractFirst(clean, [
    /(?:Weight|Gross Weight|Chargeable Weight)[:\s]+([0-9.,]+\s?(?:KG|KGS|LB|LBS)?)/i
  ]);

  const shipper = extractFirst(clean, [
    /(?:Shipper|Sender|Exporter)[:\s]+([^\n]+)/i
  ]);

  const consignee = extractFirst(clean, [
    /(?:Consignee|Receiver|Importer)[:\s]+([^\n]+)/i
  ]);

  const origin = extractFirst(clean, [
    /(?:Origin|From|POL|Port of Loading)[:\s]+([^\n]+)/i
  ]);

  const destination = extractFirst(clean, [
    /(?:Destination|To|POD|Port of Discharge)[:\s]+([^\n]+)/i
  ]);

  fillIfEmpty("client", consignee || shipper);
  fillIfEmpty("origin", origin);
  fillIfEmpty("destination", destination);
  fillIfEmpty("eta", normaliseDate(etaRaw));

  console.log("Parsed document:", {
    awb,
    carrier,
    eta: normaliseDate(etaRaw),
    pieces,
    weight,
    shipper,
    consignee
  });
}

function initDocUpload() {
  const input = document.getElementById("docUpload");
  if (!input) return;

  input.addEventListener("change", e => {
    selectedDocs = Array.from(e.target.files || []);
    updateDocList();

    selectedDocs.forEach(async file => {
      try {
        const text = await readDocText(file);
        parseShipmentText(text);
      } catch (err) {
        console.warn("Could not parse file:", file.name, err);
      }
    });
  });
}

async function uploadSelectedDocs() {
  const urls = [...existingDocs];

  for (const file of selectedDocs) {
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    const path = `${Date.now()}_${safeName}`;

    const { error } = await sb.storage
      .from(BUCKET)
      .upload(path, file);

    if (error) {
      alert("Document upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage
      .from(BUCKET)
      .getPublicUrl(path);

    urls.push(data.publicUrl);
  }

  return urls;
}

function initMap() {
  if (map) {
    map.invalidateSize();
    return;
  }

  map = L.map("map").setView([53.3498, -6.2603], 4);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap"
  }).addTo(map);

  mapLayer = L.layerGroup().addTo(map);
  setTimeout(() => map.invalidateSize(), 300);
}

async function geocode(place) {
  if (!place) return [53.3, -6.2];

  const key = place.toLowerCase();
  if (geoCache[key]) return geoCache[key];

  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(place)}`
    );
    const data = await res.json();

    if (data[0]) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[key] = coords;
      return coords;
    }
  } catch {}

  return [53.3, -6.2];
}

function statusClass(s) {
  if (s === "In Transit") return "transit";
  if (s === "Delivered") return "delivered";
  if (s === "Delayed") return "delayed";
  return "pending";
}

function riskLabel(x) {
  if (!x.eta || x.status === "Delivered") return "";

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const eta = new Date(x.eta);
  eta.setHours(0, 0, 0, 0);

  const diff = Math.ceil((eta - today) / 86400000);

  if (diff < 0) return "Overdue";
  if (diff <= 2) return "At Risk";
  return "";
}

function setAlertFilter(type) {
  alertFilter = type;
  renderRows();
}

function baseVisible() {
  let data = isAdminUser()
    ? shipments
    : shipments.filter(x => !x.assigned_to || String(x.assigned_to).toLowerCase() === String(user?.email || "").toLowerCase());

  if (showMine) {
    data = data.filter(x => String(x.assigned_to || "").toLowerCase() === String(user?.email || "").toLowerCase());
  }

  if (typeFilter !== "All") {
    data = data.filter(x => (x.shipment_type || "") === typeFilter);
  }

  return data;
}

function getVisible() {
  let data = baseVisible();

  if (alertFilter === "overdue") {
    data = data.filter(x => riskLabel(x) === "Overdue");
  }

  if (alertFilter === "risk") {
    data = data.filter(x => riskLabel(x) === "At Risk");
  }

  return data;
}

function eventDateValue(x, field) {
  if (field === "pickup") return x.pickup_date || "";
  if (field === "etd") return x.etd || "";
  if (field === "eta") return x.eta || "";
  return "";
}

function renderTimeline(data) {
  const grid = document.getElementById("timelineGrid");
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    return d;
  });

  grid.innerHTML = days.map(day => {
    const key = day.toISOString().slice(0, 10);
    const events = [];

    data.forEach(x => {
      if (eventDateValue(x, "pickup") === key) events.push({ type: "Pickup", item: x });
      if (eventDateValue(x, "etd") === key) events.push({ type: "ETD", item: x });
      if (eventDateValue(x, "eta") === key) events.push({ type: "ETA", item: x });
    });

    const eventHtml = events.length
      ? events.map(e => {
          const r = riskLabel(e.item);
          const cls =
            r === "Overdue" ? "overdue" :
            r === "At Risk" ? "risk" :
            e.item.status === "Delivered" ? "delivered" : "";

          return `
            <div class="timeline-item ${cls}">
              <strong>${e.type} · ${e.item.shipment_type || "Shipment"}</strong>
              <div class="timeline-customer">${e.item.client || "No customer"}</div>
              <div>${e.item.shipment_ref || ""}</div>
              <div class="timeline-route">${e.item.origin || ""} → ${e.item.destination || ""}</div>
            </div>
          `;
        }).join("")
      : `<div style="color:#6f7d93; font-size:12px;">No events</div>`;

    return `
      <div class="timeline-day">
        <h3>${day.toLocaleDateString("en-GB", { weekday: "short", day: "2-digit", month: "short" })}</h3>
        ${eventHtml}
      </div>
    `;
  }).join("");
}

async function renderMap(data) {
  if (!mapLayer) return;

  mapLayer.clearLayers();
  const bounds = [];

  for (const x of data.slice(0, 10)) {
    const o = await geocode(x.origin);
    const d = await geocode(x.destination);

    bounds.push(o, d);

    const color =
      riskLabel(x) === "Overdue" || x.status === "Delayed" ? "red" :
      x.status === "Delivered" ? "green" :
      "#06b7a5";

    L.polyline([o, d], {
      color,
      weight: 4,
      opacity: .85,
      dashArray: x.status === "In Transit" ? "8,8" : null
    }).addTo(mapLayer);

    L.marker(o).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.origin || ""}`);
    L.marker(d).addTo(mapLayer).bindPopup(`<strong>${x.shipment_ref || ""}</strong><br>${x.client || ""}<br>${x.destination || ""}`);
  }

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 6 });
  }
}

function renderUnassigned() {
  const box = document.getElementById("unassignedBox");
  const list = shipments.filter(x => !x.assigned_to);

  if (!list.length) {
    box.innerHTML = `<div style="color:#6f7d93;">No unassigned shipments</div>`;
    return;
  }

  box.innerHTML = list.slice(0, 8).map(x => `
    <div class="unassigned-card">
      <strong>${x.client || "No customer"}</strong>
      <small>${x.shipment_type || "Shipment"} · ${x.origin || ""} → ${x.destination || ""}</small><br>
      <button class="primary-btn" style="height:36px; margin-top:8px;" onclick="takeShipment('${x.id}')">Take</button>
    </div>
  `).join("");
}

async function takeShipment(id) {
  const { error } = await sb
    .from("shipments")
    .update({ assigned_to: user.email })
    .eq("id", id);

  if (error) {
    alert("Could not take shipment: " + error.message);
    return;
  }

  await loadShipments();
  statusMsg.textContent = "Shipment assigned to you ✔";
}

function renderRows() {
  const data = getVisible();
  const allVisible = baseVisible();

  if (!data.length) {
    rows.innerHTML = `<tr><td colspan="9">No shipments found.</td></tr>`;
  } else {
    rows.innerHTML = data.map(x => {
      const risk = riskLabel(x);
      const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

      return `
      <tr style="
        ${risk === "Overdue" ? "background:#fff3f3;" : ""}
        ${risk === "At Risk" ? "background:#fff9f0;" : ""}
      ">
        <td>${x.shipment_ref || ""}</td>
        <td>${x.client || ""}</td>
        <td><span class="pill pickup">${x.shipment_type || "Not set"}</span></td>
        <td>${x.origin || ""} → ${x.destination || ""}</td>
        <td>
          <span class="pill ${statusClass(x.status)}">${x.status || "Pending"}</span>
          ${risk ? `<span class="pill ${risk === "Overdue" ? "delayed" : "pending"}">${risk}</span>` : ""}
        </td>
        <td>${eventDateValue(x, "eta") || "-"}</td>
        <td>${docs.length ? docs.map((u, i) => `<a class="doc-link" href="${u}" target="_blank">Doc ${i + 1}</a>`).join("") : "-"}</td>
        <td>${x.assigned_to || "-"}</td>
        <td>
          <button class="action-btn" onclick="editShipment('${x.id}')">✏️</button>
          <button class="action-btn" onclick="setStatus('${x.id}','In Transit')">🚚</button>
          <button class="action-btn" onclick="setStatus('${x.id}','Delivered')">✅</button>
          <button class="action-btn" onclick="deleteShipment('${x.id}')">🗑️</button>
        </td>
      </tr>`;
    }).join("");
  }

  document.getElementById("totalStat").textContent = data.length;
  document.getElementById("transitStat").textContent = data.filter(x => x.status === "In Transit").length;
  document.getElementById("delayedStat").textContent = data.filter(x => x.status === "Delayed" || riskLabel(x)).length;

  document.getElementById("alertAll").textContent = allVisible.length;
  document.getElementById("alertOverdue").textContent = allVisible.filter(x => riskLabel(x) === "Overdue").length;
  document.getElementById("alertRisk").textContent = allVisible.filter(x => riskLabel(x) === "At Risk").length;

  renderTimeline(data);
  renderMap(data);
  renderUnassigned();

  statusMsg.textContent =
    (typeFilter !== "All" ? typeFilter + " · " : "") +
    (showMine ? "Showing my shipments: " + data.length : "Loaded " + data.length + " shipment(s)");
}

function editShipment(id) {
  const x = shipments.find(s => s.id === id);
  if (!x) return;

  editingId = id;
  selectedDocs = [];
  existingDocs = Array.isArray(x.document_urls) ? x.document_urls : [];

  document.getElementById("modalTitle").textContent = "Edit Shipment";

  document.getElementById("client").value = x.client || "";
  document.getElementById("origin").value = x.origin || "";
  document.getElementById("destination").value = x.destination || "";
  document.getElementById("assigned").value = x.assigned_to || "";
  document.getElementById("shipmentType").value = x.shipment_type || "Air Import";
  document.getElementById("pickupDate").value = x.pickup_date || "";
  document.getElementById("etdDate").value = x.etd || "";
  document.getElementById("eta").value = x.eta || "";
  document.getElementById("status").value = x.status || "Pending";

  updateDocList();
  modal.classList.add("show");
}

async function setStatus(id, status) {
  const { error } = await sb
    .from("shipments")
    .update({ status })
    .eq("id", id);

  if (error) {
    alert("Update failed: " + error.message);
    return;
  }

  await loadShipments();
  statusMsg.textContent = "Shipment updated ✔";
}

async function deleteShipment(id) {
  if (!confirm("Delete this shipment?")) return;

  const { error } = await sb
    .from("shipments")
    .delete()
    .eq("id", id);

  if (error) {
    alert("Delete failed: " + error.message);
    return;
  }

  await loadShipments();
  statusMsg.textContent = "Shipment deleted ✔";
}

async function loadShipments() {
  statusMsg.textContent = "Loading...";

  const { data, error } = await sb
    .from("shipments")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    statusMsg.textContent = "LOAD ERROR: " + error.message;
    return;
  }

  shipments = data || [];
  renderRows();
}

document.getElementById("saveBtn").onclick = async () => {
  const documentUrls = await uploadSelectedDocs();

  const payload = {
    client: getVal("client"),
    origin: getVal("origin"),
    destination: getVal("destination"),
    assigned_to: getVal("assigned") || null,
    shipment_type: getVal("shipmentType") || "Air Import",
    pickup_date: getVal("pickupDate") || null,
    etd: getVal("etdDate") || null,
    eta: getVal("eta") || null,
    status: getVal("status") || "Pending",
    document_urls: documentUrls
  };

  if (!payload.client || !payload.origin || !payload.destination) {
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  let error;

  if (editingId) {
    const res = await sb
      .from("shipments")
      .update(payload)
      .eq("id", editingId);

    error = res.error;
  } else {
    const res = await sb
      .from("shipments")
      .insert([{
        ...payload,
        shipment_ref: "SHP" + Date.now(),
        priority: "Medium",
        created_by_email: user?.email || null,
        source: "manual"
      }]);

    error = res.error;
  }

  if (error) {
    alert("SAVE ERROR: " + error.message);
    return;
  }

  clearForm();
  modal.classList.remove("show");
  await loadShipments();
  statusMsg.textContent = "Saved ✔";
};

document.getElementById("loginBtn").onclick = login;
document.getElementById("logoutBtn").onclick = logout;

myBtn.onclick = () => {
  showMine = !showMine;
  myBtn.classList.toggle("active", showMine);
  renderRows();
};

document.getElementById("openBtn").onclick = () => {
  clearForm();
  modal.classList.add("show");
};

document.getElementById("cancelBtn").onclick = () => {
  clearForm();
  modal.classList.remove("show");
};

modal.onclick = e => {
  if (e.target === modal) {
    clearForm();
    modal.classList.remove("show");
  }
};

async function init() {
  renderLoginUsers();
  renderUserDropdown();
  renderTypeFilters();
  initDocUpload();

  const { data } = await sb.auth.getSession();

  if (data.session?.user) {
    user = data.session.user;
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("avatar").textContent = initials(user.email);

    loginScreen.style.display = "none";
    app.style.display = "grid";

    initMap();
    await loadShipments();
  } else {
    loginScreen.style.display = "flex";
    app.style.display = "none";
  }
}

init();
