<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GateFlow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {font-family: Arial; margin:0; background:#f4f7f8}
.login {display:flex; height:100vh; align-items:center; justify-content:center}
.card {background:white; padding:30px; border-radius:12px; width:320px}
input,button {width:100%; padding:10px; margin-top:10px}
.app {display:none}
.sidebar {width:200px; background:#04142e; color:white; height:100vh; float:left}
.content {margin-left:200px; padding:20px}
.nav {padding:12px; cursor:pointer}
.nav:hover {background:#0a1f43}
.table {width:100%; background:white}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>GateFlow</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="msg"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="nav" onclick="view='dashboard';render()">Dashboard</div>
    <div class="nav" onclick="view='jobs';render()">Jobs</div>
    <div class="nav" onclick="view='assign';render()">Jobs to Assign</div>
    <div class="nav" onclick="view='bd';render()">BD Handovers</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkkejbk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let user=null;
let view='dashboard';

async function login(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){document.getElementById('msg').innerText=error.message;return;}
  user=data.user;
  start();
}

async function start(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

async function render(){
  if(view==='dashboard') renderDashboard();
  if(view==='jobs') renderJobs();
  if(view==='assign') renderAssign();
  if(view==='bd') renderBD();
}

async function renderDashboard(){
  const {data}=await sb.from('shipments').select('*');
  document.getElementById('content').innerHTML=`
    <h1>Dashboard</h1>
    <div id="map" style="height:400px"></div>
  `;
  const map=L.map('map').setView([20,0],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  data.forEach(s=>{
    if(s.destination){
      L.marker([20,0]).addTo(map).bindPopup(s.destination);
    }
  });
}

async function renderJobs(){
  const {data}=await sb.from('shipments').select('*');
  document.getElementById('content').innerHTML=`
    <h1>Assigned Jobs</h1>
    <table class="table">
      ${data.map(s=>`<tr><td>${s.shipment_ref}</td><td>${s.client}</td></tr>`).join('')}
    </table>
  `;
}

async function renderAssign(){
  const {data}=await sb.from('shipments').select('*').is('assigned_to',null);
  document.getElementById('content').innerHTML=`
    <h1>Jobs to Assign</h1>
    <table class="table">
      ${data.map(s=>`<tr><td>${s.shipment_ref}</td></tr>`).join('')}
    </table>
  `;
}

function parseText(text){
  const vip=/vip|urgent/i.test(text);
  const ref=text.match(/(SHP|JOB)[- ]?\d+/i)?.[0];
  const client=text.match(/client[:\- ](.+)/i)?.[1];
  return {vip,ref,client};
}

async function renderBD(){
  document.getElementById('content').innerHTML=`
    <h1>BD Parser</h1>
    <textarea id="raw" style="width:100%;height:150px"></textarea>
    <button onclick="doParse()">Parse</button>
    <div id="out"></div>
  `;
}

function doParse(){
  const t=document.getElementById('raw').value;
  const r=parseText(t);
  document.getElementById('out').innerText=JSON.stringify(r,null,2);
}

</script>

</body>
</html>
