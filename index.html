<!DOCTYPE html>
<html>
<head>
  <title>GateFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial; display:flex; height:100vh; }

    .sidebar {
      width:220px;
      background:#111;
      color:white;
      padding:15px;
    }

    .sidebar h3 { margin-top:0; }
    .sidebar div {
      margin:10px 0;
      cursor:pointer;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      background:#222;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    .content { padding:20px; overflow:auto; }

    .hidden { display:none; }

    input, select {
      padding:8px;
      margin:5px 0;
      width:250px;
    }

    button {
      padding:8px 12px;
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
    }

    .job {
      border:1px solid #ccc;
      padding:10px;
      margin:10px 0;
    }

    .login-box {
      margin:auto;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
  <h2>GateFlow Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button id="loginBtn">Sign In</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">

  <div class="sidebar">
    <h3>GateFlow</h3>
    <div onclick="showPage('dashboard')">Dashboard</div>
    <div onclick="showPage('jobs')">Jobs</div>
    <div onclick="showPage('bd')">BD Handovers</div>
    <div onclick="showPage('calendar')">Calendar</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div id="userDisplay"></div>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="content">

      <!-- DASHBOARD -->
      <div id="dashboardPage">
        <h2>Dashboard</h2>
        <p>Welcome to GateFlow</p>
      </div>

      <!-- JOBS -->
      <div id="jobsPage" class="hidden">
        <h2>Create Job</h2>

        <select id="jobType">
          <option>Air Import</option>
          <option>Air Export</option>
          <option>Ocean Import</option>
          <option>Ocean Export</option>
        </select><br>

        <input id="customer" placeholder="Customer"><br>
        <input id="shipper" placeholder="Shipper"><br>
        <input id="consignee" placeholder="Consignee"><br>
        <input id="ref" placeholder="AWB / Ref"><br>
        <input id="pieces" placeholder="Pieces"><br>
        <input id="weight" placeholder="Weight"><br>
        <input id="collectionDate" type="date"><br>
        <input id="etd" type="date"><br>
        <input id="eta" type="date"><br>
        <input id="transport" placeholder="Airline / Haulier"><br>

        <button onclick="createJob()">Save Job</button>

        <h3>Jobs</h3>
        <div id="jobList"></div>
      </div>

      <!-- BD -->
      <div id="bdPage" class="hidden">
        <h2>BD Handovers</h2>
        <input type="file" id="bdFile">
        <button onclick="uploadBD()">Upload</button>
        <div id="bdList"></div>
      </div>

      <!-- CALENDAR -->
      <div id="calendarPage" class="hidden">
        <h2>Calendar</h2>
        <div id="calendarList"></div>
      </div>

    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CURRENT_USER = null;

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("loginBtn").addEventListener("click", login);
});

/* LOGIN */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    document.getElementById("loginError").innerText = error.message;
    return;
  }

  const { data: user } = await supabase
    .from('gf_users')
    .select('*')
    .eq('email', email)
    .single();

  if (!user) {
    document.getElementById("loginError").innerText = "User not found";
    return;
  }

  CURRENT_USER = user;
  startApp();
}

/* START */
function startApp() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");

  document.getElementById("userDisplay").innerText =
    "@" + (CURRENT_USER.username || CURRENT_USER.email);

  loadJobs();
}

/* LOGOUT */
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* NAVIGATION */
function showPage(page) {
  document.querySelectorAll(".content > div").forEach(d => d.classList.add("hidden"));
  document.getElementById(page + "Page").classList.remove("hidden");
}

/* JOBS */
async function createJob() {
  const job = {
    type: document.getElementById("jobType").value,
    customer: customer.value,
    shipper: shipper.value,
    consignee: consignee.value,
    ref: ref.value,
    pieces: parseInt(pieces.value),
    weight: parseFloat(weight.value),
    collection_date: collectionDate.value,
    etd: etd.value,
    eta: eta.value,
    transport: transport.value,
    created_by: CURRENT_USER.email
  };

  await supabase.from('gf_jobs').insert([job]);
  loadJobs();
}

async function loadJobs() {
  const { data } = await supabase.from('gf_jobs').select('*');

  const list = document.getElementById("jobList");
  list.innerHTML = "";

  data.forEach(j => {
    const div = document.createElement("div");
    div.className = "job";
    div.innerHTML = `${j.type} | ${j.customer} | ETA: ${j.eta}`;
    list.appendChild(div);
  });
}

/* BD HANDOVER */
async function uploadBD() {
  alert("BD upload placeholder (can wire to storage next)");
}
</script>

</body>
</html>
