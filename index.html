<!DOCTYPE html>
<html>
<head>
  <title>GateKeeper</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding:20px; }
    button { padding:10px 15px; cursor:pointer; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input, select {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
  </style>
</head>

<body>

<h2>GateKeeper Shipments</h2>

<button id="openBtn">+ Add Shipment</button>

<table border="1" cellpadding="10" style="margin-top:20px;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Client</th>
      <th>Route</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add Shipment</h3>

    <input id="client" placeholder="Client">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">

    <select id="status">
      <option>Pending</option>
      <option>In Transit</option>
      <option>Delivered</option>
      <option>Delayed</option>
    </select>

    <button onclick="save()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

// UI
const modal = document.getElementById("modal");
const openBtn = document.getElementById("openBtn");

openBtn.onclick = () => modal.classList.add("show");

function closeModal() {
  modal.classList.remove("show");
}

// LOAD DATA
async function load() {
  const { data, error } = await supabase
    .from("shipments")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("LOAD ERROR: " + error.message);
    return;
  }

  document.getElementById("rows").innerHTML = (data || []).map(x => `
    <tr>
      <td>${x.shipment_ref}</td>
      <td>${x.client}</td>
      <td>${x.origin} → ${x.destination}</td>
      <td>${x.status}</td>
    </tr>
  `).join("");
}

// SAVE DATA
async function save() {
  const payload = {
    shipment_ref: "SHP" + Date.now(),
    client: document.getElementById("client").value,
    origin: document.getElementById("origin").value,
    destination: document.getElementById("destination").value,
    shipment_type: "Road",
    status: document.getElementById("status").value,
    priority: "Medium"
  };

  const { error } = await supabase
    .from("shipments")
    .insert([payload]);

  if (error) {
    alert("SAVE ERROR: " + error.message);
    return;
  }

  closeModal();

  // clear inputs
  document.getElementById("client").value = "";
  document.getElementById("origin").value = "";
  document.getElementById("destination").value = "";

  load();
}

// INIT
load();
</script>

</body>
</html>
