<!DOCTYPE html>
<html>
<head>
  <title>Button Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>
<body>
  <h2>GateKeeper Button Test</h2>

  <button onclick="document.getElementById('modal').classList.add('show')">
    + Add Shipment
  </button>

  <div id="msg" style="margin-top:12px;">Version: BUTTON-TEST-2</div>

  <div id="modal" class="modal">
    <div class="box">
      <h3>Add Shipment</h3>
      <p>If you can see this, the button works.</p>
      <button onclick="document.getElementById('modal').classList.remove('show')">
        Close
      </button>
    </div>
  </div>
</body>
</html>
