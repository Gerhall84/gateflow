<!DOCTYPE html>
<html>
<head>
  <title>GateFlow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; margin:0; }
    .topbar {
      background:#111;
      color:white;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .container { padding:20px; }
    .hidden { display:none; }
    input { padding:8px; margin:5px 0; width:250px; }
    button { padding:8px 12px; cursor:pointer; }
    .job { border:1px solid #ccc; padding:10px; margin:10px 0; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="container">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">
  <div class="topbar">
    <div id="userDisplay"></div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h2>Create Job</h2>

    <input id="customer" placeholder="Customer"><br>
    <input id="shipper" placeholder="Shipper"><br>
    <input id="consignee" placeholder="Consignee"><br>
    <input id="ref" placeholder="AWB / Ref"><br>
    <input id="pieces" placeholder="Pieces"><br>
    <input id="weight" placeholder="Weight"><br>
    <input id="collectionDate" type="date"><br>
    <input id="etd" type="date"><br>
    <input id="eta" type="date"><br>
    <input id="transport" placeholder="Airline / Haulier"><br>

    <button onclick="createJob()">Save Job</button>

    <h2>Jobs</h2>
    <div id="jobList"></div>
  </div>
</div>

<script>
/* =============================
   🔑 SUPABASE CONFIG
============================= */
const SUPABASE_URL = 'https://edxgkwkdgvsajfmkejbk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeGdrd2tkZ3ZzYWpmbWtlamJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzMzIsImV4cCI6MjA5MjI4ODMzMn0.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let CURRENT_USER = null;

/* =============================
   🔐 LOGIN
============================= */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email, password
  });

  if (error) {
    document.getElementById("loginError").innerText = error.message;
    return;
  }

  const { data: user } = await supabase
    .from('gf_users')
    .select('*')
    .eq('email', email)
    .single();

  if (!user) {
    document.getElementById("loginError").innerText =
      "User not found in system";
    return;
  }

  CURRENT_USER = user;
  startApp();
}

/* =============================
   🚀 START APP
============================= */
function startApp() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");

  document.getElementById("userDisplay").innerText =
    "@" + (CURRENT_USER.username || CURRENT_USER.email);

  loadJobs();
}

/* =============================
   🔓 LOGOUT
============================= */
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* =============================
   💾 SAVE JOB
============================= */
async function createJob() {
  const job = {
    customer: document.getElementById("customer").value,
    shipper: document.getElementById("shipper").value,
    consignee: document.getElementById("consignee").value,
    ref: document.getElementById("ref").value,
    pieces: parseInt(document.getElementById("pieces").value),
    weight: parseFloat(document.getElementById("weight").value),
    collection_date: document.getElementById("collectionDate").value,
    etd: document.getElementById("etd").value,
    eta: document.getElementById("eta").value,
    transport: document.getElementById("transport").value,
    created_by: CURRENT_USER.email
  };

  const { error } = await supabase.from('gf_jobs').insert([job]);

  if (error) {
    alert(error.message);
  } else {
    loadJobs();
  }
}

/* =============================
   📥 LOAD JOBS
============================= */
async function loadJobs() {
  const { data } = await supabase
    .from('gf_jobs')
    .select('*')
    .order('created_at', { ascending: false });

  const container = document.getElementById("jobList");
  container.innerHTML = "";

  data.forEach(job => {
    const div = document.createElement("div");
    div.className = "job";

    div.innerHTML = `
      <b>${job.customer}</b><br>
      ${job.shipper} → ${job.consignee}<br>
      Ref: ${job.ref}<br>
      ETA: ${job.eta}
    `;

    container.appendChild(div);
  });
}

/* =============================
   🔁 AUTO LOGIN
============================= */
async function checkSession() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    const email = data.session.user.email;

    const { data: user } = await supabase
      .from('gf_users')
      .select('*')
      .eq('email', email)
      .single();

    if (user) {
      CURRENT_USER = user;
      startApp();
    }
  }
}

checkSession();
</script>

</body>
</html>
