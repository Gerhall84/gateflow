<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GateKeeper Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --nav:#04142e;
      --text:#11213d;
      --muted:#6f7d93;
      --brand:#06b7a5;
      --brand-dark:#069788;
      --line:#e4ebed;
      --danger:#ef5c5c;
      --success:#18a66e;
      --warning:#f0a227;
      --blue:#2d79ff;
      --shadow:0 25px 60px rgba(6,20,46,0.08);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#f4f7f8,#eef4f5);
      color:var(--text);
    }

    button { font-family:inherit; cursor:pointer; }

    input, select {
      width:100%;
      height:46px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 12px;
      margin-bottom:10px;
      background:white;
    }

    .login-screen {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#04142e,#063b63);
      padding:20px;
    }

    .login-card {
      width:100%;
      max-width:430px;
      background:white;
      border-radius:24px;
      padding:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
    }

    .login-card img {
      display:block;
      max-width:200px;
      margin:0 auto 20px;
    }

    .login-card h1 {
      text-align:center;
      margin:0 0 8px;
      color:var(--nav);
    }

    .login-card p {
      text-align:center;
      margin:0 0 24px;
      color:var(--muted);
    }

    .login-error {
      color:var(--danger);
      font-size:13px;
      text-align:center;
      margin-top:10px;
    }

    .app {
      display:none;
      min-height:100vh;
      grid-template-columns:250px 1fr;
    }

    .sidebar {
      background:linear-gradient(180deg,#04142e,#021127);
      color:white;
      padding:26px 16px;
      display:flex;
      flex-direction:column;
      min-height:100vh;
      box-shadow:4px 0 30px rgba(0,0,0,.25);
    }

    .brand {
      text-align:center;
      padding:10px 8px 22px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:18px;
    }

    .brand img {
      max-width:180px;
      margin-bottom:12px;
    }

    .brand strong {
      color:#3f73e8;
      font-size:14px;
    }

    .nav a {
      display:flex;
      color:white;
      padding:14px;
      border-radius:16px;
      font-weight:700;
      margin-bottom:8px;
      text-decoration:none;
      cursor:pointer;
    }

    .nav a.active,
    .nav a:hover {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .side-label {
      color:rgba(255,255,255,.45);
      font-size:11px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      margin:18px 12px 10px;
    }

    .type-nav button {
      width:100%;
      text-align:left;
      background:transparent;
      color:white;
      border:0;
      padding:11px 14px;
      border-radius:14px;
      font-weight:800;
      margin-bottom:5px;
    }

    .type-nav button:hover,
    .type-nav button.active {
      background:rgba(6,183,165,.18);
      color:#8efff1;
    }

    .sidebar-footer {
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      gap:12px;
      align-items:center;
      font-size:12px;
    }

    .avatar {
      width:42px;
      height:42px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
    }

    .main { padding:28px; }

    .welcome h1 {
      margin:0 0 8px;
      font-size:28px;
    }

    .welcome p {
      margin:0 0 18px;
      color:var(--muted);
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .topbar-left,
    .topbar-right {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .primary-btn {
      height:46px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:white;
      padding:0 22px;
      font-weight:900;
      box-shadow:0 12px 30px rgba(6,183,165,.3);
    }

    .secondary-btn {
      height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:white;
      color:var(--text);
      padding:0 20px;
      font-weight:800;
    }

    .secondary-btn.active {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }

    .type-filter-bar {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .type-chip {
      height:40px;
      border:1px solid var(--line);
      background:white;
      border-radius:999px;
      padding:0 14px;
      font-weight:900;
      color:var(--text);
      box-shadow:0 10px 25px rgba(6,20,46,.04);
    }

    .type-chip.active,
    .type-chip:hover {
      background:#dff7f3;
      color:var(--brand-dark);
      border-color:var(--brand);
    }
        .stats {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:16px;
    }

    .card {
      background:white;
      border-radius:22px;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.03);
      overflow:hidden;
      margin-bottom:16px;
    }

    .stat-card { padding:22px; }

    .stat-label {
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }

    .stat-value {
      font-size:30px;
      font-weight:900;
    }

    .grid {
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:16px;
      margin-bottom:16px;
    }

    .section-head {
      padding:20px 20px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .section-head h2 {
      margin:0;
      color:var(--brand-dark);
      font-size:18px;
    }

    #map {
      height:420px;
      border-radius:18px;
      margin:16px;
    }

    .timeline {
      padding:16px;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
    }

    .timeline-day {
      background:#f8fbfc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      min-height:140px;
      font-size:12px;
    }

    .timeline-item {
      margin-top:8px;
      padding:8px;
      border-left:4px solid var(--brand);
      background:white;
      border-radius:8px;
    }

    .timeline-item.risk {
      border-left-color:#f0a227;
      background:#fff4e0;
    }

    .timeline-item.overdue {
      border-left-color:#ef5c5c;
      background:#ffecec;
      font-weight:700;
    }

    .calendar-grid {
      padding:16px;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:10px;
    }

    .calendar-cell {
      min-height:120px;
      background:#f8fbfc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      font-size:12px;
    }

    .calendar-date {
      font-weight:900;
      margin-bottom:6px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:12px;
      border-bottom:1px solid var(--line);
      font-size:13px;
    }

    th { background:#f6f9fb; }

    tr.row-risk {
      background:#fff4e0;
      border-left:6px solid #f0a227;
    }

    tr.row-overdue {
      background:#ffe4e4;
      border-left:6px solid #ef5c5c;
      font-weight:700;
    }

    .pill {
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }

    .pending { background:#fff1da; }
    .transit { background:#dff7f3; }
    .delivered { background:#dff5eb; }
    .delayed { background:#ffe4e4; }

    .screen { display:none; }
    .screen.active { display:block; }

    .modal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      align-items:center;
      justify-content:center;
    }

    .modal.show { display:flex; }

    .modal-box {
      background:white;
      padding:20px;
      border-radius:16px;
      width:90%;
      max-width:600px;
    }
  </style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>GateKeeper</h1>
    <select id="loginUserSelect"></select>
    <input id="loginEmail" style="display:none;">
    <input id="loginPassword" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>
</div>

<div class="app" id="app">

  <aside class="sidebar">
    <nav class="nav">
      <a onclick="showScreen('dashboard')">Dashboard</a>
      <a onclick="showScreen('shipments')">Shipments</a>
      <a onclick="showScreen('calendar')">Calendar</a>
    </nav>
  </aside>

  <main class="main">

    <div id="screenDashboard" class="screen active">
      <h2>Dashboard</h2>
      <div id="map"></div>
      <div id="unassigned"></div>
      <table>
        <tbody id="dashboardRows"></tbody>
      </table>
    </div>
        <div id="screenShipments" class="screen">
      <div class="section-head">
        <h2>All Shipments</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Type</th>
            <th>Route</th>
            <th>Status</th>
            <th>ETA</th>
            <th>Docs</th>
            <th>Assigned</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="shipmentRows"></tbody>
      </table>
    </div>

    <div id="screenCalendar" class="screen">
      <div class="section-head">
        <h2>Monthly Calendar</h2>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="topbar">
      <button class="primary-btn" id="openBtn">+ Add Shipment</button>
      <button class="secondary-btn" id="myBtn">My Shipments</button>
      <button class="secondary-btn" id="logoutBtn">Logout</button>
    </div>

  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">Add Shipment</h2>

    <div class="doc-upload-box">
      <input id="docUpload" type="file" multiple>
      <div id="docList">No documents</div>
    </div>

    <input id="client" placeholder="Customer">
    <input id="origin" placeholder="Origin">
    <input id="destination" placeholder="Destination">
    <input id="awb" placeholder="AWB / Waybill">
    <input id="carrier" placeholder="Carrier">
    <input id="pieces" placeholder="Pieces">
    <input id="weight" placeholder="Weight">
    <input id="shipper" placeholder="Shipper">
    <input id="consignee" placeholder="Consignee">
    <input id="eta" type="date">

    <select id="assigned"></select>
    <select id="shipmentType"></select>

    <div class="modal-actions">
      <button class="secondary-btn" id="cancelBtn">Cancel</button>
      <button class="primary-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>
<script>
const sb = window.supabase.createClient(
  "https://edxgkwkdgvsajfmkejbk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYXNlIiwicmVmIjoiZWR4Z2t3a2RndnNhamZta2VqYmsiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc3NjcxMjMzMiwiZXhwIjoyMDkyMjg4MzMyfQ.hZZg78n6DgwiBNrdI34wVmBYia8PsLMnT-vEJr20fek"
);

const users = [
  { name:"Gerard Hall", email:"gerard.hall@mauriceward.com" },
  { name:"Balazs Bekes", email:"balazs.bekes@mauriceward.com" },
  { name:"Ashley Nason", email:"ashley.nason@mauriceward.com" },
  { name:"Lisa O'Neill", email:"lisa.oneill@mauriceward.com" },
  { name:"Damian Halpin", email:"damian.halpin@mauriceward.com" },
  { name:"Jason O'Neill", email:"jason.o.neill@mauriceward.com" },
  { name:"Ciara Burns", email:"ciara.burns@mauriceward.com" },
  { name:"Dominic Martins", email:"dominic.martins@mauriceward.com" },
  { name:"Roisin Hogan", email:"roisin.hogan@mauriceward.com" },
  { name:"Lee Hodges", email:"lee.hodges@mauriceward.com" },
  { name:"Allanah O'Brien", email:"allanah.obrien@mauriceward.com" },
  { name:"Darragh O Neill", email:"darragh.oneill@mauriceward.com" },
  { name:"Tea Pitanti-Ivanac", email:"tea.pitanti-ivanac@mauriceward.com" },
  { name:"Gary Mc Gettrick", email:"gary.mcgettrick@mauriceward.com" },
  { name:"Eoin Ryan", email:"eoin.ryan@mauriceward.com" },
  { name:"Natacha Martins", email:"natacha.martins@mauriceward.com" }
];

const shipmentTypes = [
  "Air Import","Air Export","Ocean Import","Ocean Export",
  "Road Import","Road Export","Road Domestic","Customs Clearance"
];

let user = null;
let shipments = [];
let editingId = null;
let selectedDocs = [];
let existingDocs = [];
let currentScreen = "dashboard";

const getVal = id => document.getElementById(id)?.value?.trim() || "";
const localDateOnly = d => d ? String(d).slice(0,10) : "";

function getRiskLevel(x){
  if(!x.eta || x.status === "Delivered") return "none";
  const today = new Date(); today.setHours(0,0,0,0);
  const eta = new Date(x.eta); eta.setHours(0,0,0,0);
  const diff = (eta - today) / 86400000;
  if(diff < 0) return "overdue";
  if(diff <= 2) return "risk";
  return "none";
}

function showScreen(name){
  currentScreen = name;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen" + name[0].toUpperCase() + name.slice(1)).classList.add("active");
  render();
}

function initDropdowns(){
  document.getElementById("loginUserSelect").innerHTML =
    `<option value="">Select your name</option>` +
    users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

  document.getElementById("loginUserSelect").onchange = e => {
    document.getElementById("loginEmail").value = e.target.value;
  };

  document.getElementById("assigned").innerHTML =
    `<option value="">Unassigned</option>` +
    users.map(u => `<option value="${u.email}">${u.name}</option>`).join("");

  document.getElementById("shipmentType").innerHTML =
    shipmentTypes.map(t => `<option>${t}</option>`).join("");
}

async function login(){
  const { data, error } = await sb.auth.signInWithPassword({
    email: getVal("loginEmail"),
    password: getVal("loginPassword")
  });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "grid";
  await loadShipments();
}

async function loadShipments(){
  const { data, error } = await sb
    .from("shipments")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    alert("Load error: " + error.message);
    return;
  }

  shipments = data || [];
  render();
}

function dashboardData(){
  return shipments.filter(x =>
    !x.assigned_to || x.assigned_to === user?.email
  );
}

function render(){
  renderDashboard();
  renderShipments();
  renderCalendar();
  renderUnassigned();
}

function rowHtml(x){
  const risk = getRiskLevel(x);
  const docs = Array.isArray(x.document_urls) ? x.document_urls : [];

  return `
    <tr class="${risk === "overdue" ? "row-overdue" : risk === "risk" ? "row-risk" : ""}">
      <td>${x.shipment_ref || ""}</td>
      <td>${x.client || ""}<br><small>${x.awb_number || ""}</small></td>
      <td>${x.shipment_type || ""}</td>
      <td>${x.origin || ""} → ${x.destination || ""}</td>
      <td>
        <span class="pill ${x.status === "Delivered" ? "delivered" : x.status === "In Transit" ? "transit" : x.status === "Delayed" ? "delayed" : "pending"}">${x.status || "Pending"}</span>
        ${risk === "overdue" ? `<span class="pill overdue-pill">⚠ OVERDUE</span>` : ""}
        ${risk === "risk" ? `<span class="pill risk-pill">⚠ AT RISK</span>` : ""}
      </td>
      <td>${localDateOnly(x.eta) || "-"}</td>
      <td>${docs.length ? docs.map((u,i)=>`<a class="doc-link" href="${u}" target="_blank">Doc ${i+1}</a>`).join("") : "-"}</td>
      <td>${x.assigned_to || "Unassigned"}</td>
      <td>
        <button class="action-btn" onclick="editShipment('${x.id}')">✏️</button>
        <button class="action-btn" onclick="setStatus('${x.id}','In Transit')">🚚</button>
        <button class="action-btn" onclick="setStatus('${x.id}','Delivered')">✅</button>
        <button class="action-btn" onclick="deleteShipment('${x.id}')">🗑️</button>
      </td>
    </tr>
  `;
}

function renderDashboard(){
  const data = dashboardData();
  document.getElementById("dashboardRows").innerHTML = data.map(rowHtml).join("");
}

function renderShipments(){
  document.getElementById("shipmentRows").innerHTML = shipments.map(rowHtml).join("");
}

function renderUnassigned(){
  const list = shipments.filter(x => !x.assigned_to);
  document.getElementById("unassigned").innerHTML = list.length
    ? list.map(x => `
      <div class="unassigned-card">
        <strong>${x.client || "No customer"}</strong><br>
        ${x.origin || ""} → ${x.destination || ""}<br>
        <button class="primary-btn" style="height:34px;margin-top:8px;" onclick="takeShipment('${x.id}')">Take</button>
      </div>
    `).join("")
    : `<div style="padding:16px;color:#6f7d93;">No unassigned shipments</div>`;
}

function renderCalendar(){
  const box = document.getElementById("calendarGrid");
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());

  let html = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
    .map(d => `<div class="calendar-day-name">${d}</div>`).join("");

  for(let i=0;i<42;i++){
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const events = shipments.filter(x => localDateOnly(x.eta) === key);

    html += `
      <div class="calendar-cell ${d.getMonth() !== month ? "muted" : ""}">
        <div class="calendar-date">${d.getDate()}</div>
        ${events.map(x => {
          const risk = getRiskLevel(x);
          return `
            <div class="calendar-item ${risk}">
              <strong>${x.client || ""}</strong><br>
              <small>${x.shipment_ref || ""}</small>
            </div>
          `;
        }).join("")}
      </div>
    `;
  }

  box.innerHTML = html;
}

async function takeShipment(id){
  await sb.from("shipments").update({ assigned_to:user.email }).eq("id",id);
  await loadShipments();
}

async function setStatus(id,status){
  await sb.from("shipments").update({ status }).eq("id",id);
  await loadShipments();
}

async function deleteShipment(id){
  if(!confirm("Delete this shipment?")) return;
  await sb.from("shipments").delete().eq("id",id);
  await loadShipments();
}

function editShipment(id){
  const x = shipments.find(s => s.id === id);
  if(!x) return;

  editingId = id;
  existingDocs = Array.isArray(x.document_urls) ? x.document_urls : [];

  document.getElementById("modalTitle").textContent = "Edit Shipment";
  document.getElementById("client").value = x.client || "";
  document.getElementById("origin").value = x.origin || "";
  document.getElementById("destination").value = x.destination || "";
  document.getElementById("awb").value = x.awb_number || "";
  document.getElementById("carrier").value = x.carrier || "";
  document.getElementById("pieces").value = x.pieces || "";
  document.getElementById("weight").value = x.weight || "";
  document.getElementById("shipper").value = x.shipper || "";
  document.getElementById("consignee").value = x.consignee || "";
  document.getElementById("eta").value = localDateOnly(x.eta);
  document.getElementById("assigned").value = x.assigned_to || "";
  document.getElementById("shipmentType").value = x.shipment_type || "Air Import";

  document.getElementById("modal").classList.add("show");
}

async function uploadDocs(){
  const urls = [];

  for(const file of selectedDocs){
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
    const path = Date.now() + "_" + safeName;
    const { error } = await sb.storage.from("shipment-documents").upload(path,file);

    if(error){
      alert("Upload failed: " + error.message);
      return urls;
    }

    const { data } = sb.storage.from("shipment-documents").getPublicUrl(path);
    urls.push(data.publicUrl);
  }

  return urls;
}

async function saveShipment(){
  const newDocs = await uploadDocs();
  const docs = [...existingDocs, ...newDocs];

  const payload = {
    client:getVal("client"),
    origin:getVal("origin"),
    destination:getVal("destination"),
    awb_number:getVal("awb"),
    carrier:getVal("carrier"),
    pieces:getVal("pieces"),
    weight:getVal("weight"),
    shipper:getVal("shipper"),
    consignee:getVal("consignee"),
    eta:getVal("eta") || null,
    assigned_to:getVal("assigned") || null,
    shipment_type:getVal("shipmentType") || "Air Import",
    status:"Pending",
    document_urls:docs
  };

  if(!payload.client || !payload.origin || !payload.destination){
    alert("Fill Customer, Origin and Destination.");
    return;
  }

  let error;

  if(editingId){
    const res = await sb.from("shipments").update(payload).eq("id",editingId);
    error = res.error;
  } else {
    const res = await sb.from("shipments").insert([{
      ...payload,
      shipment_ref:"SHP"+Date.now(),
      created_by_email:user?.email || null,
      source:"manual"
    }]);
    error = res.error;
  }

  if(error){
    alert("Save error: " + error.message);
    return;
  }

  editingId = null;
  existingDocs = [];
  selectedDocs = [];

  document.getElementById("modal").classList.remove("show");
  await loadShipments();
}

document.getElementById("loginBtn").onclick = login;
document.getElementById("saveBtn").onclick = saveShipment;
document.getElementById("cancelBtn").onclick = () => document.getElementById("modal").classList.remove("show");
document.getElementById("openBtn").onclick = () => {
  editingId = null;
  existingDocs = [];
  selectedDocs = [];
  document.getElementById("modalTitle").textContent = "Add Shipment";
  document.getElementById("modal").classList.add("show");
};
document.getElementById("logoutBtn").onclick = async () => { await sb.auth.signOut(); location.reload(); };
document.getElementById("myBtn").onclick = () => showScreen("dashboard");

document.getElementById("docUpload").onchange = e => {
  selectedDocs = Array.from(e.target.files || []);
  document.getElementById("docList").innerHTML = selectedDocs.length
    ? selectedDocs.map(f => "📄 " + f.name).join("<br>")
    : "No documents";
};

initDropdowns();
</script>
</body>
</html>
